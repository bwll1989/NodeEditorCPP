<div class="ep-frame-root" :style="rootStyle">
  <div class="ep-frame-box" :style="frameStyle"></div>
  <div v-if="label" class="ep-frame-label" :style="labelStyle">{{ label }}</div>
  <style>
    .ep-frame-root{ width: 100%; height: 100%; position: relative; overflow: visible; }
    .ep-frame-box{ width: 100%; height: 100%; }
    .ep-frame-label{ user-select: none; }
  </style>
</div>
