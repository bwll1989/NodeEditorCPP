<div class="ep-tl-root" :style="rootStyle" @pointerdown="onRootPointerDown">
  <style>
    .ep-tl-root{
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    .ep-tl-root .ep-tl-base{
      position: absolute;
      left: 8px;
      right: 8px;
      top: var(--ep-tl-y, 70%);
      height: var(--ep-tl-line-w, 2px);
      background: var(--ep-tl-line-color, #e5e7eb);
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 1;
    }

    .ep-tl-root .ep-tl-cursor{
      position: absolute;
      top: 0;
      bottom: 0;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 4;
    }

    .ep-tl-root .ep-tl-cursor-line{
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--ep-tl-point-color, #2563eb);
      opacity: 0.9;
      transform: translateX(-50%);
    }

    .ep-tl-root .ep-tl-cursor-label{
      position: absolute;
      left: 50%;
      top: calc(var(--ep-tl-y, 70%) - 12px);
      transform: translate(-50%, -100%);
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(17, 24, 39, 0.92);
      color: #ffffff;
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .ep-tl-root .ep-tl-canvas{
      position: relative;
      height: 100%;
      min-width: 100%;
      width: 100%;
      box-sizing: border-box;
    }

    .ep-tl-root .ep-tl-ticks,
    .ep-tl-root .ep-tl-nodes{
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .ep-tl-root .ep-tl-ticks{ z-index: 2; }
    .ep-tl-root .ep-tl-nodes{ z-index: 3; }

    .ep-tl-root .ep-tl-tick{
      position: absolute;
      top: 0;
      bottom: 0;
      height: 100%;
      transform: translateX(-50%);
      color: var(--ep-tl-text-color, #111827);
      font-size: 12px;
    }

    .ep-tl-root .ep-tl-tick-line{
      position: absolute;
      left: 50%;
      top: calc(var(--ep-tl-y, 70%) + 0px);
      width: 1px;
      height: 8px;
      background: var(--ep-tl-line-color, #e5e7eb);
      transform: translateX(-50%);
      opacity: 0.9;
    }

    .ep-tl-root .ep-tl-tick-label{
      position: absolute;
      left: 50%;
      top: calc(var(--ep-tl-y, 70%) + 10px);
      transform: translateX(-50%);
      white-space: nowrap;
      opacity: 0.85;
    }

    .ep-tl-root .ep-tl-node{
      position: absolute;
      top: 0;
      height: 100%;
      transform: translateX(-50%);
      width: var(--ep-tl-label-max, 160px);
      max-width: var(--ep-tl-label-max, 160px);
      pointer-events: auto;
      cursor: default;
    }

    .ep-tl-root .ep-tl-name{
      position: absolute;
      left: 50%;
      cursor: grab;
      touch-action: none;
      top: calc(8px + (var(--ep-tl-lane, 0) * 22px));
      transform: translateX(-50%);
      user-select: none;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 2px 6px;
      border: 1px solid var(--ep-tl-label-border, #e5e7eb);
      border-radius: 4px;
      background: transparent;
      color: var(--ep-tl-text-color, #111827);
      font-size: inherit;
      line-height: 1.4;
      box-sizing: border-box;
    }

    .ep-tl-root .ep-tl-name:focus,
    .ep-tl-root .ep-tl-name.is-selected{
      outline: none;
      box-shadow: 0 0 0 2px var(--ep-tl-point-color, #2563eb);
    }

    .ep-tl-root .ep-tl-hint{
      position: absolute;
      top: calc(var(--ep-tl-y, 70%) - 10px);
      transform: translate(-50%, -100%);
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(17, 24, 39, 0.92);
      color: #ffffff;
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }

    .ep-tl-root .ep-tl-name:focus,
    .ep-tl-root .ep-tl-name.is-selected{
      outline: none;
      box-shadow: 0 0 0 2px var(--ep-tl-point-color, #2563eb);
    }

    .ep-tl-root .ep-tl-hint{
      position: absolute;
      top: calc(var(--ep-tl-y, 70%) - 10px);
      transform: translate(-50%, -100%);
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(17, 24, 39, 0.92);
      color: #ffffff;
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }

    .ep-tl-root .ep-tl-leader{
      position: absolute;
      left: 50%;
      top: calc(34px + (var(--ep-tl-lane, 0) * 22px));
      width: 1px;
      height: calc(var(--ep-tl-y, 70%) - (42px + (var(--ep-tl-lane, 0) * 22px)));
      min-height: 10px;
      background: var(--ep-tl-line-color, #e5e7eb);
      transform: translateX(-50%);
      box-sizing: border-box;
    }

    .ep-tl-root .ep-tl-dot{
      position: absolute;
      left: 50%;
      top: var(--ep-tl-y, 70%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ep-tl-point-color, #2563eb);
      border: 2px solid transparent;
      transform: translate(-50%, -50%);
      box-sizing: border-box;
    }


  </style>

  <div class="ep-tl-canvas">
    <div class="ep-tl-base"></div>

    <div
      v-if="cursor && (commandId || '')"
      class="ep-tl-cursor"
      :style="{ left: (cursor.left ?? 0) + '%' }">
      <div class="ep-tl-cursor-line"></div>
      <div class="ep-tl-cursor-label">{{ cursor.label }}</div>
    </div>

    <div class="ep-tl-ticks">
      <div
        class="ep-tl-tick"
        v-for="t in ticks"
        :key="t.key"
        :style="{ left: t.left + '%' }">
        <div class="ep-tl-tick-line"></div>
        <div class="ep-tl-tick-label">{{ t.label }}</div>
      </div>
    </div>

    <div class="ep-tl-nodes">
      <div
        class="ep-tl-node"
        v-for="n in nodes"
        :key="n.key"
        :title="n.timeLabel || n.title"
        :style="{ left: n.left + '%', '--ep-tl-lane': n.lane ?? 0 }">
        <div
          class="ep-tl-name"
          :class="{ 'is-selected': (selectedId || '') === (n.id || '') }"
          tabindex="0"
          @focus="selectNode(n)"
          @blur="clearSelection"
          @click.stop="selectNode(n)"
          @keydown.stop="onNameKeydown(n, $event)"
          @keydown.esc.stop.prevent="clearSelection"
          @pointerdown.stop="startDragging(n, $event)">{{ n.text }}</div>
        <div class="ep-tl-leader"></div>
        <div class="ep-tl-dot"></div>
      </div>

      <div
        v-if="dragHint"
        class="ep-tl-hint"
        :style="{ left: (dragHint.left ?? 0) + '%' }">{{ dragHint.text }}</div>
    </div>
  </div>
</div>
