<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <title>NodeStudio Dashboard</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="assets/vendor/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/index.css" rel="stylesheet"/>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; }
    h1 { color: #2b6cb0; margin-bottom: 12px; }
    .app-shell { display: flex; height: 100vh; }
    .main-area { flex: 1; padding: 0; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

    .sidebar-left { display: none !important; }
    .sidebar-right { width: 320px; display: flex; flex-direction: column; transition: width 0.3s ease, padding 0.3s ease; overflow-y: auto; overflow-x: hidden; padding-top: 56px; box-sizing: border-box; background: linear-gradient(#525c66 0 56px, #fff 56px); border-left: none; position: relative; }
    .sidebar-right::before { content: ''; position: absolute; left: 0; top: 56px; bottom: 0; width: 1px; background: #e1e4e8; }
    .sidebar-right.collapsed { width: 0; padding: 0; border: none; overflow: hidden; }
    .sidebar-right::-webkit-scrollbar { width: 5px; }
    .sidebar-right::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
    .sidebar-right::-webkit-scrollbar-track { background: transparent; }
    .sidebar-right .btn-icon { display:inline-flex; align-items:center; margin-right:6px; }
    .sidebar-right .btn-icon svg { width:14px; height:14px; stroke: currentColor; fill: none; stroke-width:2; }
    /* Unified right sidebar styles */
    .sidebar-right .sidebar-section-header { font-weight: 600; font-size: 13px; color: #334155; background: #f8fafc; border-bottom: 1px solid #e1e4e8; padding: 6px 8px; border-radius: 8px 8px 0 0; }
    .sidebar-right .sidebar-section-content { background: #ffffff; border: 1px solid #e1e4e8; border-top: none; border-radius: 0 0 8px 8px; padding: 8px; }
    .sidebar-right .btn { border-radius: 6px; font-size: 12px; }
    .sidebar-right input[type="text"], .sidebar-right input[type="number"], .sidebar-right select { width: 100%; height: 30px; padding: 4px 8px; border: 1px solid #dfe7ef; border-radius: 6px; font-size: 13px; }
    .sidebar-right .prop-label { font-size: 12px; color: #64748b; font-weight: 500; }
    .sidebar-right .prop-value { font-size: 13px; color: #334155; }

    .gutter.gutter-horizontal { position: relative; background: linear-gradient(#525c66 0 56px, rgba(203,213,225,0.4) 56px); }
    .gutter.gutter-horizontal:hover { background: linear-gradient(#525c66 0 56px, rgba(148,163,184,0.6) 56px); }
    .gutter.gutter-horizontal .gutter-handle { position:absolute; left:0; right:0; top:56px; bottom:0; display:flex; align-items:center; justify-content:center; }
    .gutter.gutter-horizontal .gutter-handle::before { content:''; width:2px; height:20px; background:#94a3b8; border-radius:1px; }
    /* 使用 Split.js 的 gutter；移除旧手柄样式 */

    .sidebar-section { padding: 12px; min-width: 320px; }
    .sidebar-section + .sidebar-section { border-top: 1px solid #e1e4e8; }
    .sidebar-right .sidebar-section { min-width: 40px; }
    .toolbar { margin-bottom: 8px; }
    .grid-stack-item-content { background: transparent; border: none; border-radius: 0; padding: 0; box-shadow: none; }

    .widget-content-wrapper .el-input-number__decrease,
    .widget-content-wrapper .el-input-number__increase {
      background: transparent !important;
      opacity: 0.65;
    }
    .widget-content-wrapper .el-input-number__decrease:hover,
    .widget-content-wrapper .el-input-number__increase:hover {
      background: transparent !important;
      opacity: 0.9;
    }

    .widget-content-wrapper { height: 100%; width: 100%; }
    .widget-mount { height: 100%; width: 100%; }
    .widget-mount > * { width: 100%; height: 100%; }
    .widget-mount .el-input,
    .widget-mount .el-input-number,
    .widget-mount .el-slider,
    .widget-mount .el-switch,
    .widget-mount .el-checkbox { width: 100%; height: 100%; }
    .widget-mount .el-input__wrapper { height: 100%; box-sizing: border-box; }
    .widget-mount .el-input__inner { height: 100%; }

    .canvas-viewport { position: relative; width: 100%; height: 100%; overflow: hidden; touch-action: none; }
    .edit-mode .canvas-viewport { cursor: grab; }
    .pixel-canvas { position: relative; background: #f8fafc; transform-origin: 0 0; will-change: transform; }
    .pixel-canvas .grid-stack-item { position: absolute; z-index: 2; }
    .pixel-canvas .grid-stack-item.ns-frame { z-index: 0; }
    .pixel-canvas.ns-drop-over { outline: 2px dashed rgba(43,108,176,0.75); outline-offset: -2px; box-shadow: inset 0 0 0 2px rgba(43,108,176,0.08); }

    .px-resize-handle { display: none; position: absolute; width: 12px; height: 12px; background: rgba(37,99,235,0.95); border: 2px solid #ffffff; border-radius: 3px; z-index: 20; }
    .edit-mode .grid-selected .px-resize-handle { display: block; }
    .edit-mode .grid-stack-item:hover .px-resize-handle { display: block; }
    .px-resize-handle[data-dir="nw"] { left: -6px; top: -6px; cursor: nwse-resize; }
    .px-resize-handle[data-dir="ne"] { right: -6px; top: -6px; cursor: nesw-resize; }
    .px-resize-handle[data-dir="sw"] { left: -6px; bottom: -6px; cursor: nesw-resize; }
    .px-resize-handle[data-dir="se"] { right: -6px; bottom: -6px; cursor: nwse-resize; }
    .widget-title { font-weight: 600; font-size: 13px; color: #475569; margin-bottom: 8px; cursor: move; }
    .view-mode .widget-title { cursor: default; }
    .view-mode .grid-stack-item-content { border-color: transparent; box-shadow: none; background: transparent; }
    .view-mode .sidebar-right, .view-mode .gutter { display: none !important; }
    .grid-selected .grid-stack-item-content { box-shadow: 0 0 0 2px rgba(43,108,176,0.15); }

    .grid-stack-item[data-group-id] .grid-stack-item-content { outline: none; }

    .group-indicator { display: none; position: absolute; border: 2px dashed rgba(16,185,129,0.75); border-radius: 10px; background: rgba(16,185,129,0.04); pointer-events: none; z-index: 1; }
    .edit-mode .group-indicator { display: block; pointer-events: none; cursor: default; }
    .view-mode .group-indicator { display: none; }
    .group-indicator.group-selected { border-color: rgba(43,108,176,0.85); background: rgba(43,108,176,0.04); }
    
    /* 编辑模式下显示遮罩层 */
    .widget-overlay-mask { display: none; }
    .edit-mode .widget-overlay-mask { display: block; cursor: move; border: 1px dashed rgba(0,0,0,0.1); }
    .edit-mode .grid-selected .widget-overlay-mask { border: 2px solid #2b6cb0; background: rgba(43,108,176,0.05); }
    /* 视图模式下确保内容可交互 */
    .view-mode .grid-stack-item-content { pointer-events: auto; }
    /* 移动端拖拽/滚动优化：默认允许纵向滚动；编辑模式禁用滚动以专注拖拽 */
    .main-area { overscroll-behavior: contain; }
    .view-mode .main-area, .view-mode .pixel-canvas { touch-action: pan-y; }
    .edit-mode .main-area, .edit-mode .pixel-canvas { touch-action: none; }
    /* 拖拽手柄不拦截事件，遮罩只在编辑模式参与命中 */
    .widget-drag-handle { pointer-events: none; }
    .view-mode .widget-overlay-mask { pointer-events: none; }
    .edit-mode .widget-overlay-mask { pointer-events: auto; touch-action: none; }
    .edit-mode .grid-stack-item.ns-widget-interact .widget-overlay-mask { pointer-events: none; border: none; background: transparent; }
    .edit-mode .grid-stack-item.ns-widget-interact .px-resize-handle { display: none !important; }
    .px-resize-handle { touch-action: none; }

    .prop-label { font-size: 12px; color: #64748b; }
    .prop-value { font-size: 13px; }

    /* 侧边栏折叠样式 */
    .sidebar-section-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
    .sidebar-section-header:hover { color: #2b6cb0; }
    .sidebar-section-content { transition: max-height 0.3s ease, opacity 0.3s ease; overflow: hidden; max-height: 3000px; opacity: 1; }
    .sidebar-section.collapsed .sidebar-section-content { max-height: 0; opacity: 0; padding: 0 !important; margin: 0 !important; }
    .toggle-icon { transition: transform 0.3s ease; }
    .sidebar-section.collapsed .toggle-icon { transform: rotate(-90deg); }
    #tabsBar { overflow: visible; }
    .top-nav { height: 56px; background: #525c66; color: #f8fafc; display: flex; align-items: center; gap: 12px; padding: 0 12px; border-bottom: 1px solid rgba(255,255,255,0.12); position: relative; }
    .top-nav-left { display: flex; align-items: center; gap: 10px; }
    .top-nav-brand-btn { width: 40px; height: 40px !important; padding: 0; display: inline-flex; align-items: center; justify-content: center; border: none !important; background: transparent !important; box-shadow: none !important; border-radius: 0 !important; }
    .top-nav-brand-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .top-nav-brand-btn img { width: 20px; height: 20px; object-fit: contain; border-radius: 4px; }
    .top-nav-center { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
    .top-nav .dropdown { position: static; }
    .top-nav .dropdown-menu {
      margin-top: 0;
      top: 56px !important;
      left: 0 !important;
      right: auto !important;
      transform: none !important;
      border-radius: 10px;
      min-width: 220px;
      padding: 6px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.10);
      z-index: 1060;
    }
    .top-nav .dropdown-menu .dropdown-item { border-radius: 8px; padding: 10px 12px; }
    .top-nav .dropdown-item.active { background: rgba(245,158,11,0.22); }
    .top-nav #tabsList { display: flex; flex-wrap: nowrap !important; gap: 0; align-items: stretch; overflow-x: auto; -webkit-overflow-scrolling: touch; min-width: 0; padding: 0; margin: 0; border-bottom: none; }
    .top-nav #tabsList .nav-link { background: transparent !important; border: none !important; color: rgba(255,255,255,0.78); padding: 0 12px; height: 56px; border-radius: 0; display: inline-flex; align-items: center; }
    .top-nav #tabsList .nav-link:hover { color: #ffffff; background: rgba(255,255,255,0.08) !important; }
    .top-nav #tabsList .nav-link.active { color: #ffffff; border-bottom: 3px solid #f59e0b !important; }
    .top-nav .tab-close { color: rgba(255,255,255,0.6); }
    .top-nav .tab-close:hover { color: #fca5a5; }
    .top-nav .btn { height: 32px; border-radius: 6px; }
    .top-nav .btn-outline-light { border-color: rgba(255,255,255,0.45); color: #ffffff; }
    .top-nav .btn-outline-light:hover { background: rgba(255,255,255,0.12); }
    .top-nav .top-nav-add { width: 34px; padding-left: 0; padding-right: 0; }
    .main-body { flex: 1; min-height: 0; overflow: auto; padding: 12px 16px; }
    #tabsContent { position: relative; height: 100%; }

    @media (max-width: 900px) {
      #toggleEditMode { display: none !important; }
      .sidebar-right { display: none !important; }
    }
    #tabsList { display: flex; flex-wrap: nowrap !important; gap: 6px; }
    #tabsList .nav-link { white-space: nowrap; display: inline-flex; align-items: center; }
    .tab-close { cursor: pointer; margin-left: 6px; line-height: 1; }
    .tab-close:hover { color: #dc3545; }

    .widget-thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; align-content: start; }
    .widget-thumb { height: 50px; padding: 8px 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border: 1px solid #e1e4e8; border-radius: 10px; background: #ffffff; color: #334155; cursor: pointer; user-select: none; }
    .widget-thumb:hover { border-color: #2b6cb0; box-shadow: 0 0 0 2px rgba(43,108,176,0.12); }
    .widget-thumb:active { transform: translateY(1px); }
    .widget-thumb:focus-visible { outline: 2px solid rgba(43,108,176,0.45); outline-offset: 2px; }
    .widget-thumb-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    .widget-thumb-icon svg { width: 24px; height: 24px; stroke: #64748b; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .widget-thumb-label { font-size: 11px; line-height: 1.1; text-align: center; color: #475569; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar-left collapsed">

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <div class="d-flex align-items-center justify-content-between flex-grow-1">
            <strong>控件库</strong>
            <small class="text-muted me-2" style="font-weight:normal; font-size: 0.8em;">拖拽后再调整</small>
          </div>
          <span class="toggle-icon">▼</span>
        </div>
        <div class="sidebar-section-content mt-2">
          <div class="widget-thumb-grid">
            <button id="addButtonWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="7" width="16" height="10" rx="2"></rect>
                  <path d="M8 12h8"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">按钮</span>
            </button>
            <button id="addSliderWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14"></path>
                  <circle cx="10" cy="12" r="3"></circle>
                </svg>
              </span>
              <span class="widget-thumb-label">滑块</span>
            </button>
            <button id="addFloatSliderWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14"></path>
                  <circle cx="14" cy="12" r="3"></circle>
                  <path d="M7 8v8"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">浮点滑块</span>
            </button>
            <button id="addVSliderWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </span>
              <span class="widget-thumb-label">竖向滑动条</span>
            </button>
            <button id="addVFloatSliderWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14"></path>
                  <circle cx="12" cy="14" r="3"></circle>
                  <path d="M8 7h8"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">竖向浮点滑块</span>
            </button>
            <button id="addCheckboxWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                  <path d="M9 12l2 2 4-5"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">勾选</span>
            </button>
            <button id="addSwitchWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="9" width="14" height="6" rx="3"></rect>
                  <circle cx="10" cy="12" r="2"></circle>
                </svg>
              </span>
              <span class="widget-thumb-label">开关</span>
            </button>
            <button id="addInputWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="8" width="14" height="8" rx="2"></rect>
                  <path d="M9 10v4"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">输入框</span>
            </button>
            <button id="addToggleButtonWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 9h10"></path>
                  <path d="M7 15h10"></path>
                  <path d="M9 9v6"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">切换按钮</span>
            </button>
            <button id="addDividerWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 12h12"></path>
                  <path d="M9 12h0"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">分割线</span>
            </button>
            <button id="addVDividerWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 6v12"></path>
                  <path d="M12 9h0"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">竖向分割线</span>
            </button>
            <button id="addLabelWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 7h8"></path>
                  <path d="M12 7v10"></path>
                  <path d="M9 17h6"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">标签</span>
            </button>
            <button id="addKnobWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="7"></circle>
                  <path d="M12 12l4-3"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">旋钮</span>
            </button>
            <button id="addTimecodeWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="6" width="16" height="12" rx="2"></rect>
                  <path d="M8 10h2"></path>
                  <path d="M14 10h2"></path>
                  <path d="M8 14h2"></path>
                  <path d="M14 14h2"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">Timecode</span>
            </button>
            <button id="addTimelineWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 12h16"></path>
                  <circle cx="6" cy="12" r="2"></circle>
                  <circle cx="12" cy="12" r="2"></circle>
                  <circle cx="18" cy="12" r="2"></circle>
                </svg>
              </span>
              <span class="widget-thumb-label">时间线</span>
            </button>
            <button id="addNumberWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 12h16"></path>
                  <path d="M10 6v12"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">数值</span>
            </button>
            <button id="addFrameWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="6" width="14" height="12" rx="2"></rect>
                </svg>
              </span>
              <span class="widget-thumb-label">Frame</span>
            </button>
            <button id="addLinkWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M10 13a5 5 0 0 1 0-7l2-2a5 5 0 0 1 7 7l-2 2"></path>
                  <path d="M14 11a5 5 0 0 1 0 7l-2 2a5 5 0 0 1-7-7l2-2"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">超链接</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="main-area">
      <div id="tabsBar" class="top-nav">
        <div class="top-nav-left">
          <div class="dropdown">
            <button id="appMenuBtn" type="button" class="btn btn-sm top-nav-brand-btn" data-bs-toggle="dropdown" aria-expanded="false" title="菜单">
              <img src="favicon.png" alt="菜单" style="width: 40px; height: 40px;" />
            </button>
            <ul class="dropdown-menu dropdown-menu-dark">
              <li><button id="toggleEditMode" type="button" class="dropdown-item">编辑模式</button></li>
              <li><button id="resetCanvasView" type="button" class="dropdown-item">重置画布视图</button></li>
              <li><button id="openSettings" type="button" class="dropdown-item">设置</button></li>
              <li><hr class="dropdown-divider"></li>
              <li><button id="wsStatusItem" type="button" class="dropdown-item" disabled>主机：未知</button></li>
              <li><button id="toggleFullscreen" type="button" class="dropdown-item">全屏</button></li>
            </ul>
          </div>
        </div>
        <div class="top-nav-center">
          <div id="tabsList" class="nav"></div>
          <button id="sidebarAddTab" type="button" class="btn btn-sm btn-outline-light top-nav-add" title="新增页面">+</button>
        </div>
      </div>
      <div class="main-body">
        <div id="tabsContent">
          <!-- 动态插入每个页面的 grid 容器 -->
        </div>
      </div>
    </div>
    <div class="sidebar-right collapsed">

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <div class="d-flex align-items-center justify-content-between flex-grow-1">
            <strong>编辑</strong>
            <small id="alignSelectionHint" class="text-muted me-2" style="font-weight:normal; font-size: 0.8em;">已选0</small>
          </div>
          <span class="toggle-icon">▼</span>
        </div>
        <div class="sidebar-section-content mt-2">
          <div class="widget-thumb-grid">
            <button id="alignLeft" type="button" class="widget-thumb">
              <span class="widget-thumb-icon"><svg viewBox="0 0 24 24"><path d="M4 6h12"></path><path d="M4 12h16"></path><path d="M4 18h8"></path></svg></span>
              <span class="widget-thumb-label">左对齐</span>
            </button>
            <button id="alignRight" type="button" class="widget-thumb">
              <span class="widget-thumb-icon"><svg viewBox="0 0 24 24"><path d="M8 6h12"></path><path d="M4 12h16"></path><path d="M12 18h8"></path></svg></span>
              <span class="widget-thumb-label">右对齐</span>
