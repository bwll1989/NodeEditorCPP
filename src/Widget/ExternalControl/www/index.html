<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <title>NodeStudio Dashboard</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="assets/vendor/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/index.css" rel="stylesheet"/>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; }
    h1 { color: #2b6cb0; margin-bottom: 12px; }
    .app-shell { display: flex; height: 100vh; }
    .main-area { flex: 1; padding: 0; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

    .sidebar-left { display: none !important; }
    .sidebar-right { width: 320px; display: flex; flex-direction: column; transition: width 0.3s ease, padding 0.3s ease; overflow-y: auto; overflow-x: hidden; padding-top: 56px; box-sizing: border-box; background: linear-gradient(#525c66 0 56px, #fff 56px); border-left: none; position: relative; }
    .sidebar-right::before { content: ''; position: absolute; left: 0; top: 56px; bottom: 0; width: 1px; background: #e1e4e8; }
    .sidebar-right.collapsed { width: 0; padding: 0; border: none; overflow: hidden; }
    .sidebar-right::-webkit-scrollbar { width: 5px; }
    .sidebar-right::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
    .sidebar-right::-webkit-scrollbar-track { background: transparent; }
    .sidebar-right .btn-icon { display:inline-flex; align-items:center; margin-right:6px; }
    .sidebar-right .btn-icon svg { width:14px; height:14px; stroke: currentColor; fill: none; stroke-width:2; }
    /* Unified right sidebar styles */
    .sidebar-right .sidebar-section-header { font-weight: 600; font-size: 13px; color: #334155; background: #f8fafc; border-bottom: 1px solid #e1e4e8; padding: 6px 8px; border-radius: 8px 8px 0 0; }
    .sidebar-right .sidebar-section-content { background: #ffffff; border: 1px solid #e1e4e8; border-top: none; border-radius: 0 0 8px 8px; padding: 8px; }
    .sidebar-right .btn { border-radius: 6px; font-size: 12px; }
    .sidebar-right input[type="text"], .sidebar-right input[type="number"], .sidebar-right select { width: 100%; height: 30px; padding: 4px 8px; border: 1px solid #dfe7ef; border-radius: 6px; font-size: 13px; }
    .sidebar-right .prop-label { font-size: 12px; color: #64748b; font-weight: 500; }
    .sidebar-right .prop-value { font-size: 13px; color: #334155; }

    .gutter.gutter-horizontal { position: relative; background: linear-gradient(#525c66 0 56px, rgba(203,213,225,0.4) 56px); }
    .gutter.gutter-horizontal:hover { background: linear-gradient(#525c66 0 56px, rgba(148,163,184,0.6) 56px); }
    .gutter.gutter-horizontal .gutter-handle { position:absolute; left:0; right:0; top:56px; bottom:0; display:flex; align-items:center; justify-content:center; }
    .gutter.gutter-horizontal .gutter-handle::before { content:''; width:2px; height:20px; background:#94a3b8; border-radius:1px; }
    /* 使用 Split.js 的 gutter；移除旧手柄样式 */

    .sidebar-section { padding: 12px; min-width: 320px; }
    .sidebar-section + .sidebar-section { border-top: 1px solid #e1e4e8; }
    .sidebar-right .sidebar-section { min-width: 40px; }
    .toolbar { margin-bottom: 8px; }
    .grid-stack-item-content { background: transparent; border: none; border-radius: 0; padding: 0; box-shadow: none; }

    .widget-content-wrapper .el-input-number__decrease,
    .widget-content-wrapper .el-input-number__increase {
      background: transparent !important;
      opacity: 0.65;
    }
    .widget-content-wrapper .el-input-number__decrease:hover,
    .widget-content-wrapper .el-input-number__increase:hover {
      background: transparent !important;
      opacity: 0.9;
    }

    .widget-content-wrapper { height: 100%; width: 100%; }
    .widget-mount { height: 100%; width: 100%; }
    .widget-mount > * { width: 100%; height: 100%; }
    .widget-mount .el-input,
    .widget-mount .el-input-number,
    .widget-mount .el-slider,
    .widget-mount .el-switch,
    .widget-mount .el-checkbox { width: 100%; height: 100%; }
    .widget-mount .el-input__wrapper { height: 100%; box-sizing: border-box; }
    .widget-mount .el-input__inner { height: 100%; }

    .canvas-viewport { position: relative; width: 100%; height: 100%; overflow: hidden; touch-action: none; }
    .pixel-canvas { position: relative; background: #f8fafc; transform-origin: 0 0; will-change: transform; }
    .pixel-canvas .grid-stack-item { position: absolute; z-index: 2; }
    .pixel-canvas .grid-stack-item.ns-frame { z-index: 0; }
    .pixel-canvas.ns-drop-over { outline: 2px dashed rgba(43,108,176,0.75); outline-offset: -2px; box-shadow: inset 0 0 0 2px rgba(43,108,176,0.08); }

    .px-resize-handle { display: none; position: absolute; width: 12px; height: 12px; background: rgba(37,99,235,0.95); border: 2px solid #ffffff; border-radius: 3px; z-index: 20; }
    .edit-mode .grid-selected .px-resize-handle { display: block; }
    .edit-mode .grid-stack-item:hover .px-resize-handle { display: block; }
    .px-resize-handle[data-dir="nw"] { left: -6px; top: -6px; cursor: nwse-resize; }
    .px-resize-handle[data-dir="ne"] { right: -6px; top: -6px; cursor: nesw-resize; }
    .px-resize-handle[data-dir="sw"] { left: -6px; bottom: -6px; cursor: nesw-resize; }
    .px-resize-handle[data-dir="se"] { right: -6px; bottom: -6px; cursor: nwse-resize; }
    .widget-title { font-weight: 600; font-size: 13px; color: #475569; margin-bottom: 8px; cursor: move; }
    .view-mode .widget-title { cursor: default; }
    .view-mode .grid-stack-item-content { border-color: transparent; box-shadow: none; background: transparent; }
    .view-mode .sidebar-right, .view-mode .gutter { display: none !important; }
    .grid-selected .grid-stack-item-content { box-shadow: 0 0 0 2px rgba(43,108,176,0.15); }

    .grid-stack-item[data-group-id] .grid-stack-item-content { outline: none; }

    .group-indicator { display: none; position: absolute; border: 2px dashed rgba(16,185,129,0.75); border-radius: 10px; background: rgba(16,185,129,0.04); pointer-events: none; z-index: 1; }
    .edit-mode .group-indicator { display: block; pointer-events: none; cursor: default; }
    .view-mode .group-indicator { display: none; }
    .group-indicator.group-selected { border-color: rgba(43,108,176,0.85); background: rgba(43,108,176,0.04); }
    
    /* 编辑模式下显示遮罩层 */
    .widget-overlay-mask { display: none; }
    .edit-mode .widget-overlay-mask { display: block; cursor: move; border: 1px dashed rgba(0,0,0,0.1); }
    .edit-mode .grid-selected .widget-overlay-mask { border: 2px solid #2b6cb0; background: rgba(43,108,176,0.05); }
    /* 视图模式下确保内容可交互 */
    .view-mode .grid-stack-item-content { pointer-events: auto; }
    /* 移动端拖拽/滚动优化：默认允许纵向滚动；编辑模式禁用滚动以专注拖拽 */
    .main-area { overscroll-behavior: contain; }
    .view-mode .main-area, .view-mode .pixel-canvas { touch-action: pan-y; }
    .edit-mode .main-area, .edit-mode .pixel-canvas { touch-action: none; }
    /* 拖拽手柄不拦截事件，遮罩只在编辑模式参与命中 */
    .widget-drag-handle { pointer-events: none; }
    .view-mode .widget-overlay-mask { pointer-events: none; }
    .edit-mode .widget-overlay-mask { pointer-events: auto; touch-action: none; }
    .edit-mode .grid-stack-item.ns-widget-interact .widget-overlay-mask { pointer-events: none; border: none; background: transparent; }
    .edit-mode .grid-stack-item.ns-widget-interact .px-resize-handle { display: none !important; }
    .px-resize-handle { touch-action: none; }

    .prop-label { font-size: 12px; color: #64748b; }
    .prop-value { font-size: 13px; }

    /* 侧边栏折叠样式 */
    .sidebar-section-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
    .sidebar-section-header:hover { color: #2b6cb0; }
    .sidebar-section-content { transition: max-height 0.3s ease, opacity 0.3s ease; overflow: hidden; max-height: 3000px; opacity: 1; }
    .sidebar-section.collapsed .sidebar-section-content { max-height: 0; opacity: 0; padding: 0 !important; margin: 0 !important; }
    .toggle-icon { transition: transform 0.3s ease; }
    .sidebar-section.collapsed .toggle-icon { transform: rotate(-90deg); }
    #tabsBar { overflow: visible; }
    .top-nav { height: 56px; background: #525c66; color: #f8fafc; display: flex; align-items: center; gap: 12px; padding: 0 12px; border-bottom: 1px solid rgba(255,255,255,0.12); position: relative; }
    .top-nav-left { display: flex; align-items: center; gap: 10px; }
    .top-nav-brand-btn { width: 40px; height: 40px !important; padding: 0; display: inline-flex; align-items: center; justify-content: center; border: none !important; background: transparent !important; box-shadow: none !important; border-radius: 0 !important; }
    .top-nav-brand-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .top-nav-brand-btn img { width: 20px; height: 20px; object-fit: contain; border-radius: 4px; }
    .top-nav-center { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
    .top-nav .dropdown { position: static; }
    .top-nav .dropdown-menu {
      margin-top: 0;
      top: 56px !important;
      left: 0 !important;
      right: auto !important;
      transform: none !important;
      border-radius: 10px;
      min-width: 220px;
      padding: 6px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.10);
      z-index: 1060;
    }
    .top-nav .dropdown-menu .dropdown-item { border-radius: 8px; padding: 10px 12px; }
    .top-nav .dropdown-item.active { background: rgba(245,158,11,0.22); }
    .top-nav #tabsList { display: flex; flex-wrap: nowrap !important; gap: 0; align-items: stretch; overflow-x: auto; -webkit-overflow-scrolling: touch; min-width: 0; padding: 0; margin: 0; border-bottom: none; }
    .top-nav #tabsList .nav-link { background: transparent !important; border: none !important; color: rgba(255,255,255,0.78); padding: 0 12px; height: 56px; border-radius: 0; display: inline-flex; align-items: center; }
    .top-nav #tabsList .nav-link:hover { color: #ffffff; background: rgba(255,255,255,0.08) !important; }
    .top-nav #tabsList .nav-link.active { color: #ffffff; border-bottom: 3px solid #f59e0b !important; }
    .top-nav .tab-close { color: rgba(255,255,255,0.6); }
    .top-nav .tab-close:hover { color: #fca5a5; }
    .top-nav .btn { height: 32px; border-radius: 6px; }
    .top-nav .btn-outline-light { border-color: rgba(255,255,255,0.45); color: #ffffff; }
    .top-nav .btn-outline-light:hover { background: rgba(255,255,255,0.12); }
    .top-nav .top-nav-add { width: 34px; padding-left: 0; padding-right: 0; }
    .main-body { flex: 1; min-height: 0; overflow: auto; padding: 12px 16px; }
    #tabsContent { position: relative; height: 100%; }

    @media (max-width: 900px) {
      #toggleEditMode { display: none !important; }
      .sidebar-right { display: none !important; }
    }
    #tabsList { display: flex; flex-wrap: nowrap !important; gap: 6px; }
    #tabsList .nav-link { white-space: nowrap; display: inline-flex; align-items: center; }
    .tab-close { cursor: pointer; margin-left: 6px; line-height: 1; }
    .tab-close:hover { color: #dc3545; }

    .widget-thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; align-content: start; }
    .widget-thumb { height: 50px; padding: 8px 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border: 1px solid #e1e4e8; border-radius: 10px; background: #ffffff; color: #334155; cursor: pointer; user-select: none; }
    .widget-thumb:hover { border-color: #2b6cb0; box-shadow: 0 0 0 2px rgba(43,108,176,0.12); }
    .widget-thumb:active { transform: translateY(1px); }
    .widget-thumb:focus-visible { outline: 2px solid rgba(43,108,176,0.45); outline-offset: 2px; }
    .widget-thumb-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    .widget-thumb-icon svg { width: 24px; height: 24px; stroke: #64748b; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .widget-thumb-label { font-size: 11px; line-height: 1.1; text-align: center; color: #475569; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar-left collapsed">

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <div class="d-flex align-items-center justify-content-between flex-grow-1">
            <strong>控件库</strong>
            <small class="text-muted me-2" style="font-weight:normal; font-size: 0.8em;">拖拽后再调整</small>
          </div>
          <span class="toggle-icon">▼</span>
        </div>
        <div class="sidebar-section-content mt-2">
          <div class="widget-thumb-grid">
            <button id="addButtonWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="7" width="16" height="10" rx="2"></rect>
                  <path d="M8 12h8"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">按钮</span>
            </button>
            <button id="addSliderWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14"></path>
                  <circle cx="10" cy="12" r="3"></circle>
                </svg>
              </span>
              <span class="widget-thumb-label">滑块</span>
            </button>
            <button id="addFloatSliderWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14"></path>
                  <circle cx="14" cy="12" r="3"></circle>
                  <path d="M7 8v8"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">浮点滑块</span>
            </button>
            <button id="addVSliderWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </span>
              <span class="widget-thumb-label">竖向滑动条</span>
            </button>
            <button id="addVFloatSliderWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14"></path>
                  <circle cx="12" cy="14" r="3"></circle>
                  <path d="M8 7h8"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">竖向浮点滑块</span>
            </button>
            <button id="addCheckboxWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                  <path d="M9 12l2 2 4-5"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">勾选</span>
            </button>
            <button id="addSwitchWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="9" width="14" height="6" rx="3"></rect>
                  <circle cx="10" cy="12" r="2"></circle>
                </svg>
              </span>
              <span class="widget-thumb-label">开关</span>
            </button>
            <button id="addInputWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="8" width="14" height="8" rx="2"></rect>
                  <path d="M9 10v4"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">输入框</span>
            </button>
            <button id="addToggleButtonWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 9h10"></path>
                  <path d="M7 15h10"></path>
                  <path d="M9 9v6"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">切换按钮</span>
            </button>
            <button id="addDividerWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 12h12"></path>
                  <path d="M9 12h0"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">分割线</span>
            </button>
            <button id="addVDividerWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 6v12"></path>
                  <path d="M12 9h0"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">竖向分割线</span>
            </button>
            <button id="addLabelWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 7h8"></path>
                  <path d="M12 7v10"></path>
                  <path d="M9 17h6"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">标签</span>
            </button>
            <button id="addKnobWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="7"></circle>
                  <path d="M12 12l4-3"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">旋钮</span>
            </button>
            <button id="addTimecodeWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="6" width="16" height="12" rx="2"></rect>
                  <path d="M8 10h2"></path>
                  <path d="M14 10h2"></path>
                  <path d="M8 14h2"></path>
                  <path d="M14 14h2"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">Timecode</span>
            </button>
            <button id="addTimelineWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 12h16"></path>
                  <circle cx="6" cy="12" r="2"></circle>
                  <circle cx="12" cy="12" r="2"></circle>
                  <circle cx="18" cy="12" r="2"></circle>
                </svg>
              </span>
              <span class="widget-thumb-label">时间线</span>
            </button>
            <button id="addNumberWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 12h16"></path>
                  <path d="M10 6v12"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">数值</span>
            </button>
            <button id="addFrameWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="6" width="14" height="12" rx="2"></rect>
                </svg>
              </span>
              <span class="widget-thumb-label">Frame</span>
            </button>
            <button id="addLinkWidget" type="button" class="widget-thumb">
              <span class="widget-thumb-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M10 13a5 5 0 0 1 0-7l2-2a5 5 0 0 1 7 7l-2 2"></path>
                  <path d="M14 11a5 5 0 0 1 0 7l-2 2a5 5 0 0 1-7-7l2-2"></path>
                </svg>
              </span>
              <span class="widget-thumb-label">超链接</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="main-area">
      <div id="tabsBar" class="top-nav">
        <div class="top-nav-left">
          <div class="dropdown">
            <button id="appMenuBtn" type="button" class="btn btn-sm top-nav-brand-btn" data-bs-toggle="dropdown" aria-expanded="false" title="菜单">
              <img src="favicon.png" alt="菜单" style="width: 40px; height: 40px;" />
            </button>
            <ul class="dropdown-menu dropdown-menu-dark">
              <li><button id="toggleEditMode" type="button" class="dropdown-item">编辑模式</button></li>
              <li><button id="openSettings" type="button" class="dropdown-item">设置</button></li>
              <li><button id="toggleFullscreen" type="button" class="dropdown-item">全屏</button></li>
            </ul>
          </div>
        </div>
        <div class="top-nav-center">
          <div id="tabsList" class="nav"></div>
          <button id="sidebarAddTab" type="button" class="btn btn-sm btn-outline-light top-nav-add" title="新增页面">+</button>
        </div>
      </div>
      <div class="main-body">
        <div id="tabsContent">
          <!-- 动态插入每个页面的 grid 容器 -->
        </div>
      </div>
    </div>
    <div class="sidebar-right collapsed">

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <div class="d-flex align-items-center justify-content-between flex-grow-1">
            <strong>编辑</strong>
            <small id="alignSelectionHint" class="text-muted me-2" style="font-weight:normal; font-size: 0.8em;">已选0</small>
          </div>
          <span class="toggle-icon">▼</span>
        </div>
        <div class="sidebar-section-content mt-2">
          <div class="widget-thumb-grid">
            <button id="alignLeft" type="button" class="widget-thumb">
              <span class="widget-thumb-icon"><svg viewBox="0 0 24 24"><path d="M4 6h12"></path><path d="M4 12h16"></path><path d="M4 18h8"></path></svg></span>
              <span class="widget-thumb-label">左对齐</span>
            </button>
            <button id="alignRight" type="button" class="widget-thumb">
              <span class="widget-thumb-icon"><svg viewBox="0 0 24 24"><path d="M8 6h12"></path><path d="M4 12h16"></path><path d="M12 18h8"></path></svg></span>
              <span class="widget-thumb-label">右对齐</span>
            </button>
            <button id="alignTop" type="button" class="widget-thumb">
              <span class="widget-thumb-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16"></path><path d="M4 12h12"></path><path d="M4 18h8"></path></svg></span>
              <span class="widget-thumb-label">上对齐</span>

  <script>
    const EPWidgets = window.EPWidgets || {};
    EPWidgets.isRemoteUpdating = false; // 初始化标志
    let grids = new Map();
    let activeTabId = null;
    let tabs = [];

    EPWidgets.layoutDefaults = { designWidth: 1280, designHeight: 720, canvasBgColor: '#f8fafc' };

    // 函数级注释：清空布局容器（像素画布）
    function clearLayoutContainer(grid) {
      try {
        const el = grid && grid.el ? grid.el : null;
        if (el) el.innerHTML = '';
      } catch {}
    }

    // 函数级注释：设置并应用页面设计尺寸与背景（像素画布使用）
    function applyPageDesign(tid, design) {
      const info = grids.get(tid);
      if (!info) return;
      const d = design && typeof design === 'object' ? design : null;
      const w = Math.max(320, Math.floor(Number(d && d.width) || (info.design && info.design.width) || EPWidgets.layoutDefaults.designWidth || 1280));
      const h = Math.max(240, Math.floor(Number(d && d.height) || (info.design && info.design.height) || EPWidgets.layoutDefaults.designHeight || 720));
      const bgRaw = (d && d.bgColor !== undefined && d.bgColor !== null) ? String(d.bgColor) : String((info.design && info.design.bgColor) || (EPWidgets.layoutDefaults && EPWidgets.layoutDefaults.canvasBgColor) || '#f8fafc');
      const bg = (bgRaw || '').trim() || String((EPWidgets.layoutDefaults && EPWidgets.layoutDefaults.canvasBgColor) || '#f8fafc');
      info.design = { width: w, height: h, bgColor: bg };
      if (info.canvasEl) {
        info.canvasEl.style.width = w + 'px';
        info.canvasEl.style.height = h + 'px';
        info.canvasEl.style.backgroundColor = bg;
      }
    }

    // 函数级注释：获取指定分页的画布视图状态（缩放/平移），若不存在则创建默认值
    function __getCanvasViewState(tid) {
      const info = tid ? grids.get(tid) : null;
      if (!info) return { scale: 1, tx: 0, ty: 0 };
      if (info.view && typeof info.view === 'object') return info.view;
      info.view = { scale: 1, tx: 0, ty: 0 };
      return info.view;
    }

    // 函数级注释：将视图状态应用到指定分页的像素画布 DOM（CSS transform）
    function __applyCanvasViewTransform(tid) {
      const info = tid ? grids.get(tid) : null;
      if (!info || !info.canvasEl) return;
      const v = __getCanvasViewState(tid);
      const s = Math.max(0.1, Math.min(8, Number(v.scale) || 1));
      const tx = Number(v.tx) || 0;
      const ty = Number(v.ty) || 0;
      v.scale = s;
      v.tx = tx;
      v.ty = ty;
      info.canvasEl.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + s + ')';
    }

    // 函数级注释：从本地存储恢复指定分页的视图状态（缩放/平移）
    function __loadCanvasViewState(tid) {
      const info = tid ? grids.get(tid) : null;
      if (!info) return;
      try {
        const raw = localStorage.getItem('ns_view_' + tid);
        if (!raw) return;
        const obj = JSON.parse(raw);
        if (!obj || typeof obj !== 'object') return;
        const scale = Math.max(0.1, Math.min(8, Number(obj.scale) || 1));
        const tx = Number(obj.tx) || 0;
        const ty = Number(obj.ty) || 0;
        info.view = { scale, tx, ty };
      } catch {}
    }

    // 函数级注释：将指定分页的视图状态持久化到本地存储（带防抖）
    function __persistCanvasViewState(tid) {
      const info = tid ? grids.get(tid) : null;
      if (!info) return;
      if (info.__viewSaveTimer) clearTimeout(info.__viewSaveTimer);
      info.__viewSaveTimer = setTimeout(() => {
        try {
          const v = __getCanvasViewState(tid);
          localStorage.setItem('ns_view_' + tid, JSON.stringify({ scale: v.scale, tx: v.tx, ty: v.ty }));
        } catch {}
      }, 200);
    }

    // 函数级注释：将鼠标/触点 client 坐标转换为画布设计坐标系 px（考虑缩放/平移）
    function __clientToCanvasDesignXY(canvasEl, clientX, clientY) {
      const c = canvasEl;
      if (!c) return { x: 0, y: 0 };
      const vp = (c.closest && c.closest('.canvas-viewport')) ? c.closest('.canvas-viewport') : null;
      const rect = (vp || c).getBoundingClientRect();
      const tid = activeTabId || (vp && vp.closest && vp.closest('[data-tab-id]') ? (vp.closest('[data-tab-id]').dataset.tabId || '') : '');
      const info = tid ? grids.get(tid) : null;
      const v = tid ? __getCanvasViewState(tid) : { scale: 1, tx: 0, ty: 0 };
      const scale = Math.max(0.1, Math.min(8, Number(v.scale) || 1));

      const designW = Math.max(320, Math.floor(Number((info && info.design && info.design.width) || EPWidgets.layoutDefaults.designWidth || 1280)));
      const designH = Math.max(240, Math.floor(Number((info && info.design && info.design.height) || EPWidgets.layoutDefaults.designHeight || 720)));

      const vx = (Number(clientX) || 0) - rect.left;
      const vy = (Number(clientY) || 0) - rect.top;
      const lx0 = (vx - (Number(v.tx) || 0)) / scale;
      const ly0 = (vy - (Number(v.ty) || 0)) / scale;
      const x = Math.max(0, Math.min(designW - 1, lx0));
      const y = Math.max(0, ly0);
      return { x, y };
    }

    // 函数级注释：确保全局按键状态跟踪已初始化（用于按住空格拖动平移）
    function __ensureCanvasPanZoomKeyTracker() {
      if (window.__nsCanvasPanZoomKeyBound) return;
      window.__nsCanvasPanZoomKeyBound = true;
      window.__nsSpaceDown = false;
      window.addEventListener('keydown', (e) => { if (e && e.code === 'Space') window.__nsSpaceDown = true; }, true);
      window.addEventListener('keyup', (e) => { if (e && e.code === 'Space') window.__nsSpaceDown = false; }, true);
      window.addEventListener('blur', () => { window.__nsSpaceDown = false; }, true);
    }

    // 函数级注释：为指定分页初始化画布缩放/平移交互（编辑模式与视图模式通用）
    function __initCanvasPanZoom(tid) {
      const info = tid ? grids.get(tid) : null;
      if (!info || !info.viewportEl || !info.canvasEl) return;
      if (info.viewportEl.dataset.panZoomBound) {
        __applyCanvasViewTransform(tid);
        return;
      }
      info.viewportEl.dataset.panZoomBound = '1';

      __ensureCanvasPanZoomKeyTracker();
      __loadCanvasViewState(tid);
      __applyCanvasViewTransform(tid);

      let isPanning = false;
      let panStart = { x: 0, y: 0, tx: 0, ty: 0 };
      const pointers = new Map();
      let pinchStart = null;

      const clampScale = (s) => Math.max(0.1, Math.min(8, Number(s) || 1));
      const getViewportRect = () => info.viewportEl.getBoundingClientRect();
      const setView = (next) => {
        const v = __getCanvasViewState(tid);
        v.scale = clampScale(next.scale);
        v.tx = Number(next.tx) || 0;
        v.ty = Number(next.ty) || 0;
        __applyCanvasViewTransform(tid);
        __persistCanvasViewState(tid);
      };

      const shouldIgnoreWheel = (e) => {
        if (!e) return true;
        const t = e.target;
        try { if (t && t.closest && t.closest('.grid-stack-item')) return true; } catch {}
        return false;
      };

      const onWheel = (e) => {
        try {
          if (!e) return;
          if (shouldIgnoreWheel(e)) return;
          const v = __getCanvasViewState(tid);
          const rect = getViewportRect();
          const mx = (Number(e.clientX) || 0) - rect.left;
          const my = (Number(e.clientY) || 0) - rect.top;

          const isZoom = !!(e.ctrlKey || e.metaKey);
          const delta = Number(e.deltaY) || 0;
          const deltaX = Number(e.deltaX) || 0;

          if (e.cancelable) e.preventDefault();

          if (isZoom) {
            const factor = Math.exp(-delta * 0.0015);
            const nextScale = clampScale((Number(v.scale) || 1) * factor);
            const worldX = (mx - (Number(v.tx) || 0)) / (Number(v.scale) || 1);
            const worldY = (my - (Number(v.ty) || 0)) / (Number(v.scale) || 1);
            const nextTx = mx - worldX * nextScale;
            const nextTy = my - worldY * nextScale;
            setView({ scale: nextScale, tx: nextTx, ty: nextTy });
          } else {
            setView({ scale: v.scale, tx: (Number(v.tx) || 0) - deltaX, ty: (Number(v.ty) || 0) - delta });
          }
        } catch {}
      };

      const onPointerDown = (e) => {
        try {
          if (!e) return;
          const isTouch = e.pointerType === 'touch';
          try { if (isTouch && e.target && e.target.closest && e.target.closest('.grid-stack-item')) return; } catch {}
          const isMiddle = e.button === 1;
          const isSpacePan = !!(window.__nsSpaceDown) && e.button === 0;
          const allowPan = isTouch || isMiddle || isSpacePan;
          if (!allowPan) return;

          try { if (e.cancelable) e.preventDefault(); } catch {}
          try { info.viewportEl.setPointerCapture(e.pointerId); } catch {}

          pointers.set(e.pointerId, { x: Number(e.clientX) || 0, y: Number(e.clientY) || 0 });

          const v = __getCanvasViewState(tid);
          if (pointers.size === 1) {
            isPanning = true;
            panStart = { x: Number(e.clientX) || 0, y: Number(e.clientY) || 0, tx: Number(v.tx) || 0, ty: Number(v.ty) || 0 };
            try { info.viewportEl.style.cursor = 'grabbing'; } catch {}
          } else if (pointers.size === 2) {
            isPanning = false;
            const pts = Array.from(pointers.values());
            const dx = pts[1].x - pts[0].x;
            const dy = pts[1].y - pts[0].y;
            const dist = Math.max(1, Math.hypot(dx, dy));
            const rect = getViewportRect();
            const cx = ((pts[0].x + pts[1].x) / 2) - rect.left;
            const cy = ((pts[0].y + pts[1].y) / 2) - rect.top;
            const worldX = (cx - (Number(v.tx) || 0)) / (Number(v.scale) || 1);
            const worldY = (cy - (Number(v.ty) || 0)) / (Number(v.scale) || 1);
            pinchStart = { dist, cx, cy, worldX, worldY, scale: Number(v.scale) || 1 };
            try { info.viewportEl.style.cursor = 'grabbing'; } catch {}
          }
        } catch {}
      };

      const onPointerMove = (e) => {
        try {
          if (!e) return;
          if (!pointers.has(e.pointerId)) return;
          pointers.set(e.pointerId, { x: Number(e.clientX) || 0, y: Number(e.clientY) || 0 });
          const v = __getCanvasViewState(tid);

          if (pointers.size === 2 && pinchStart) {
            const pts = Array.from(pointers.values());
            const dx = pts[1].x - pts[0].x;
            const dy = pts[1].y - pts[0].y;
            const dist = Math.max(1, Math.hypot(dx, dy));
            const rect = getViewportRect();
            const cx = ((pts[0].x + pts[1].x) / 2) - rect.left;
            const cy = ((pts[0].y + pts[1].y) / 2) - rect.top;
            const nextScale = clampScale((Number(pinchStart.scale) || 1) * (dist / (Number(pinchStart.dist) || 1)));
            const nextTx = cx - (Number(pinchStart.worldX) || 0) * nextScale;
            const nextTy = cy - (Number(pinchStart.worldY) || 0) * nextScale;
            setView({ scale: nextScale, tx: nextTx, ty: nextTy });
            return;
          }

          if (!isPanning) return;
          const dx = (Number(e.clientX) || 0) - (Number(panStart.x) || 0);
          const dy = (Number(e.clientY) || 0) - (Number(panStart.y) || 0);
          setView({ scale: v.scale, tx: (Number(panStart.tx) || 0) + dx, ty: (Number(panStart.ty) || 0) + dy });
        } catch {}
      };

      const onPointerUp = (e) => {
        try {
          if (!e) return;
          pointers.delete(e.pointerId);
          try { info.viewportEl.releasePointerCapture(e.pointerId); } catch {}
          if (pointers.size < 2) pinchStart = null;
          if (pointers.size === 0) {
            isPanning = false;
            try { info.viewportEl.style.cursor = ''; } catch {}
          }
        } catch {}
      };

      info.viewportEl.addEventListener('wheel', onWheel, { passive: false });
      info.viewportEl.addEventListener('pointerdown', onPointerDown, true);
      info.viewportEl.addEventListener('pointermove', onPointerMove, true);
      info.viewportEl.addEventListener('pointerup', onPointerUp, true);
      info.viewportEl.addEventListener('pointercancel', onPointerUp, true);
    }
    
    // WebSocket 状态同步
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = wsProtocol + '//' + location.host + '/ws';
    let ws = null;
    let wsReconnectTimer = null;
    const WS_HEARTBEAT_INTERVAL_MS = 5000;
    let wsHeartbeatTimer = null;
    
    // 函数级注释：查询所有已加载控件的状态（发送 query 指令），增加防抖处理避免短时间内多次查询
    let queryStatusTimer = null;
    function queryAllStatuses() {
        if (queryStatusTimer) clearTimeout(queryStatusTimer);
        queryStatusTimer = setTimeout(() => {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const ids = new Set();
            grids.forEach(info => {
                const grid = info.grid;
                if (!grid || !grid.el) return;
                const items = grid.el.querySelectorAll('.grid-stack-item');
                items.forEach(item => {
                    const props = EPWidgets.getProps(item);
                    if (props.commandId) {
                        ids.add(props.commandId);
                    }
                    const pItems = Array.isArray(props.items) ? props.items : null;
                    if (pItems) {
                        pItems.forEach(it => {
                            const id = it && (it.id ?? it.commandId);
                            const s = (id !== undefined && id !== null) ? String(id).trim() : '';
                            if (s) ids.add(s);
                        });

                    }
                });
            });
            const arr = Array.from(ids);
            if (arr.length > 0) {
                const CHUNK = 128;
                for (let i = 0; i < arr.length; i += CHUNK) {
                    const sub = arr.slice(i, i + CHUNK);
                    try { ws.send(JSON.stringify({ query: sub })); } catch {}
                }
            }
        }, 300); // 300ms 防抖
    }

    // 函数级注释：跳转到设置页面（setting.html）
    function openSettingsPage() {
        window.location.href = 'setting.html';
    }

    // 函数级注释：向服务器提交设置页/编辑模式密码进行校验（POST /api/auth/setting）
    async function verifySettingPassword(password) {
      try {
        const resp = await fetch('/api/auth/setting', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: password || '' })
        });
        const j = await resp.json().catch(() => null);
        return !!(resp.ok && j && j.ok);
      } catch {
        return false;
      }
    }

    // 函数级注释：进入编辑模式前进行密码校验（若服务器未配置密码，则自动通过）
    async function requireSettingAuth() {
      const okEmpty = await verifySettingPassword('');
      if (okEmpty) return true;
      while (true) {
        const pw = window.prompt('请输入编辑模式密码');
        if (pw === null) return false;
        const ok = await verifySettingPassword(pw);
        if (ok) return true;
        window.alert('密码错误');
      }
    }

    // 函数级注释：初始化全屏控制（按钮绑定与状态同步）
    function setupFullscreenControls() {
        const btn = document.getElementById('toggleFullscreen');
        if (!btn) return;
        updateFullscreenButton();
        btn.addEventListener('click', toggleFullscreen);
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('msfullscreenchange', updateFullscreenButton);
    }

    // 函数级注释：切换全屏（进入/退出）
    function toggleFullscreen() {
        const doc = document;
        const isFs = doc.fullscreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement;
        const root = document.documentElement;
        if (!isFs) {
            const req = root.requestFullscreen || root.webkitRequestFullscreen || root.msRequestFullscreen;
            if (req) req.call(root);
        } else {
            const exit = doc.exitFullscreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
            if (exit) exit.call(doc);
        }
    }

    // 函数级注释：根据当前全屏状态更新按钮文本
    function updateFullscreenButton() {
        const btn = document.getElementById('toggleFullscreen');
        if (!btn) return;
        const doc = document;
        const isFs = doc.fullscreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement;
        btn.textContent = isFs ? '退出全屏' : '全屏';
    }

    // 函数级注释：启动 WebSocket 心跳定时器（每隔固定时间发送一次无副作用 JSON，维持连接活跃）
    function startWebSocketHeartbeat() {
        stopWebSocketHeartbeat();
        wsHeartbeatTimer = setInterval(() => {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            try {
                ws.send(JSON.stringify({ heartbeat: true, t: Date.now() }));
            } catch (e) {
            }
        }, WS_HEARTBEAT_INTERVAL_MS);
    }

    // 函数级注释：停止 WebSocket 心跳定时器
    function stopWebSocketHeartbeat() {
        if (wsHeartbeatTimer) {
            clearInterval(wsHeartbeatTimer);
            wsHeartbeatTimer = null;
        }
    }

    function connectWebSocket() {
        if (ws) return;
        ws = new WebSocket(wsUrl);
        ws.onopen = function() {
            console.log('WebSocket connected');
            if (wsReconnectTimer) {
                clearTimeout(wsReconnectTimer);
                wsReconnectTimer = null;
            }
            startWebSocketHeartbeat();
            // 连接建立后尝试查询一次（处理重连场景）
            queryAllStatuses();
        };
        ws.onmessage = function(event) {
            try {
                const msg = JSON.parse(event.data);
                console.log('WS received:', msg); // Debug log
                if (msg.address) {
                    try {
                        window.dispatchEvent(new CustomEvent('ws-message', {
                            detail: { commandId: String(msg.address), value: msg.value, text: msg.text, raw: msg }
                        }));
                    } catch (e) {
                    }

                    // 标记为远程更新，阻止 sendCommand
                    EPWidgets.isRemoteUpdating = true;
                    
                    // 遍历所有 grid 查找匹配的 widget
                    grids.forEach(info => {
                        const grid = info.grid;
                        if (!grid || !grid.el) return;
                        // 注意：grid.el 是 .grid-stack 容器，.grid-stack-item 是其子元素
                        const items = grid.el.querySelectorAll('.grid-stack-item');
                        items.forEach(item => {
                            // 获取 item 绑定的 API
                            const props = EPWidgets.getProps(item);
                            // 检查 commandId
                            const target = msg.address;
                            if (props.commandId === target) {
                                console.log('Updating widget:', target, msg.value); // Debug log
                                EPWidgets.setProps(item, { value: msg.value });
                            }
                        });
                    });
                    
                    // 恢复标志（等待 Vue watcher 周期结束）
                    const vue = EPWidgets.getVue();
                    if (vue && vue.nextTick) {
                        vue.nextTick(() => { EPWidgets.isRemoteUpdating = false; });
                    } else {
                        setTimeout(() => { EPWidgets.isRemoteUpdating = false; }, 0);
                    }
                }
            } catch (e) {
                console.error('WebSocket message error:', e);
                EPWidgets.isRemoteUpdating = false;
            }
        };
        ws.onclose = function() {
            console.log('WebSocket closed');
            stopWebSocketHeartbeat();
            ws = null;
            if (!wsReconnectTimer) {
                wsReconnectTimer = setTimeout(connectWebSocket, 3000);
            }
        };
        ws.onerror = function(err) {
            console.error('WebSocket error:', err);
        };
    }
    // 页面加载完成后连接
    // 函数级注释：使用 Split.js 初始化分栏（画布 + 右侧边栏），并持久化右侧宽度
    function setupSplitPanels() {
        try { mergeLeftSidebarIntoRight(); } catch {}
        const shell = document.querySelector('.app-shell');
        const main = document.querySelector('.main-area');
        const right = document.querySelector('.sidebar-right');
        if (!shell || !main || !right || typeof window.Split === 'undefined') return;
        const MIN_RIGHT = 0, GUTTER = 6;

        let sizesPct = null;
        try {
            const rw = Number(localStorage.getItem('ns_sidebar_right_w') || 0);
            const total = shell.clientWidth || 1;
            if (rw > 0) {
                const rp = Math.max(MIN_RIGHT, rw) / total * 100;
                const mp = Math.max(0, 100 - rp);
                sizesPct = [mp, rp];
                right.classList.remove('collapsed');
            } else {
                right.classList.add('collapsed');
            }
        } catch {}

        const split = Split(['.main-area', '.sidebar-right'], {
            direction: 'horizontal',
            gutterSize: GUTTER,
            cursor: 'col-resize',
            minSize: [240, MIN_RIGHT],
            sizes: sizesPct || [75, 25],
            onDragEnd: (sizes) => {
                try {
                    const total = shell.clientWidth || 1;
                    const rp = sizes[1] / 100 * total;
                    localStorage.setItem('ns_sidebar_right_w', String(Math.floor(rp)));
                    localStorage.setItem('ns_split_sizes', JSON.stringify(sizes));
                    if (sizes[1] > 0.5) localStorage.setItem('ns_right_last_pct', String(sizes[1]));
                } catch {}
                try { updateGutterVisibility(sizes); } catch {}
            }
        });
        window.__splitInstance = split;
        function updateGutterVisibility(sizes){
          const rp = sizes[1] || 0;
          try { right.classList.toggle('collapsed', rp <= 0.01); } catch {}
        }
        try {
          const guts = Array.from(document.querySelectorAll('.gutter.gutter-horizontal'));
          guts.forEach(g => {
            const existing = Array.from(g.querySelectorAll('.gutter-handle'));
            existing.slice(1).forEach(el => el.remove());
            if (existing.length === 0) {
              const h = document.createElement('div');
              h.className = 'gutter-handle';
              g.appendChild(h);
            }
          });
          const EPS = 0.01;
          const toggleRight = () => {
            const cur = split.getSizes();
            if ((cur[1] || 0) <= EPS) {
              const restore = Number(localStorage.getItem('ns_right_last_pct') || '25');
              split.setSizes([Math.max(0, 100 - restore), restore]);
            } else {
              localStorage.setItem('ns_right_last_pct', String(cur[1]));
              split.setSizes([100, 0]);
            }
            updateGutterVisibility(split.getSizes());
          };
          if (guts[0]) guts[0].addEventListener('dblclick', toggleRight);
          updateGutterVisibility(split.getSizes());
        } catch {}
    }

    if (document.readyState === 'complete') {
        connectWebSocket();
        setupFullscreenControls();
        setupSplitPanels();
    } else {
        window.addEventListener('load', () => {
            connectWebSocket();

            setupSplitPanels();
        });
    }

    // 函数级注释：读取节点的分组链（外->内）；兼容旧 data-group-id（单层分组）
    function __getNodeGroupChain(node) {
      try {
        const raw = String((node && node.dataset ? (node.dataset.groupChain || '') : '') || '').trim();
        if (raw) {
          const arr = raw.split(',').map(s => String(s || '').trim()).filter(Boolean);
          return arr;
        }
      } catch {}
      try {
        const gid = String((node && node.dataset ? (node.dataset.groupId || '') : '') || '').trim();
        return gid ? [gid] : [];
      } catch { return []; }
    }

    // 函数级注释：写回节点的分组链（外->内）；同时维护 data-group-id=最内层（兼容旧逻辑）
    function __setNodeGroupChain(node, chain) {
      if (!node || !node.dataset) return;
      const arr = Array.isArray(chain) ? chain.map(s => String(s || '').trim()).filter(Boolean) : [];
      const leaf = arr.length ? String(arr[arr.length - 1] || '').trim() : '';
      try {
        if (arr.length) node.dataset.groupChain = arr.join(',');
        else node.removeAttribute('data-group-chain');
      } catch {}
      try {
        if (leaf) node.dataset.groupId = leaf;
        else node.removeAttribute('data-group-id');
      } catch {}
    }

    // 函数级注释：判断节点是否属于某个分组（gid 可能是外层或内层）
    function __nodeInGroup(node, gid) {
      const g = String(gid || '').trim();
      if (!g) return false;
      const chain = __getNodeGroupChain(node);
      return !!(chain && chain.length && chain.indexOf(g) >= 0);
    }

    // 函数级注释：构建当前页分组的父子关系与深度（用于父子组选中归一化、指示框层级）
    function __buildGroupMeta(canvas) {
      const parentOf = new Map();
      const depthOf = new Map();
      if (!canvas) return { parentOf, depthOf };
      const nodes = Array.from(canvas.querySelectorAll('.grid-stack-item[data-group-id], .grid-stack-item[data-group-chain]'));
      nodes.forEach(n => {
        const chain = __getNodeGroupChain(n);
        chain.forEach((gid, idx) => {
          const g = String(gid || '').trim();
          if (!g) return;
          const p = idx > 0 ? String(chain[idx - 1] || '').trim() : '';
          if (p && !parentOf.has(g)) parentOf.set(g, p);
          const cur = depthOf.has(g) ? Number(depthOf.get(g)) : -1;
          if (idx > cur) depthOf.set(g, idx);
        });
      });
      return { parentOf, depthOf };
    }

    // 函数级注释：将选中的分组列表归一化（若父组已选中，则剔除其子组，避免重复位移/缩放）
    function __normalizeSelectedGroupIds(canvas, gids) {
      const arr = (Array.isArray(gids) ? gids : []).map(g => String(g || '').trim()).filter(Boolean);
      if (!arr.length) return [];
      const meta = __buildGroupMeta(canvas);
      const sel = new Set(arr);
      return arr.filter(gid => {
        let p = meta.parentOf.get(gid) || '';
        while (p) {
          if (sel.has(p)) return false;
          p = meta.parentOf.get(p) || '';
        }
        return true;
      });
    }

    // 函数级注释：获取某个分组的成员节点列表（支持嵌套：groupChain 包含 gid 即视为成员）
    function __getGroupMembers(canvas, gid) {
      if (!canvas) return [];
      const g = String(gid || '').trim();
      if (!g) return [];
      try {
        const nodes = Array.from(canvas.querySelectorAll('.grid-stack-item[data-group-id], .grid-stack-item[data-group-chain]'));
        return nodes.filter(n => __nodeInGroup(n, g));
      } catch { return []; }
    }

    // 函数级注释：收集指定页面的控件项（全局作用域，供多分页保存使用；仅像素 rect）
    function collectGridItems(grid) {
      const items = [];
      const nodes = (grid && grid.el) ? grid.el.querySelectorAll('.grid-stack-item') : [];
      nodes.forEach(item => {
        const type = item.dataset.type || '';
        const props = EPWidgets.getProps(item);
        const groupId = String(item.dataset.groupId || '').trim();
        const groupChain = String(item.dataset.groupChain || '').trim();

        const pxX = Number(item.dataset.pxX);
        const pxY = Number(item.dataset.pxY);
        const pxW = Number(item.dataset.pxW);
        const pxH = Number(item.dataset.pxH);
        const hasPx = Number.isFinite(pxX) && Number.isFinite(pxY) && Number.isFinite(pxW) && Number.isFinite(pxH);

        if (!type) return;
        if (hasPx) {
          items.push({ type, props, groupId, groupChain, rect: { x: pxX, y: pxY, w: pxW, h: pxH } });
          return;
        }

        const x = Math.max(0, Math.round(Number(item.offsetLeft) || 0));
        const y = Math.max(0, Math.round(Number(item.offsetTop) || 0));
        const w = Math.max(10, Math.round(Number(item.offsetWidth) || 10));
        const h = Math.max(10, Math.round(Number(item.offsetHeight) || 10));
        items.push({ type, props, groupId, groupChain, rect: { x, y, w, h } });
      });
      return items;
    }
    // 函数级注释：按控件类型创建控件（像素画布体系）
    function __createWidgetByType(grid, type, props, opts) {
      const t = String(type || '').trim();
      const p = props && typeof props === 'object' ? props : {};
      const o = opts && typeof opts === 'object' ? opts : {};
      if (t === '按钮') return EPWidgets.createEPButtonWidget(grid, p, o);
      if (t === '滑块') return EPWidgets.createEPSliderWidget(grid, p, o);
      if (t === '浮点滑块') return EPWidgets.createEPFloatSliderWidget(grid, p, o);
      if (t === '勾选') return EPWidgets.createEPCheckboxWidget(grid, p, o);
      if (t === '开关') return EPWidgets.createEPSwitchWidget(grid, p, o);
      if (t === '输入框') return EPWidgets.createEPInputWidget(grid, p, o);
      if (t === '切换按钮') return EPWidgets.createEPToggleButtonWidget(grid, p, o);
      if (t === '分割线') return EPWidgets.createEPDividerWidget(grid, p, o);
      if (t === '竖向分割线') return EPWidgets.createEPVDividerWidget(grid, p, o);
      if (t === '标签') return EPWidgets.createEPLabelWidget(grid, p, o);
      if (t === '竖向滑动条') return EPWidgets.createEPVSliderWidget(grid, p, o);
      if (t === '竖向浮点滑块') return EPWidgets.createEPVFloatSliderWidget(grid, p, o);
      if (t === '旋钮') return EPWidgets.createEPKnobWidget(grid, p, o);
      if (t === '时间码') return EPWidgets.createEPTimecodeWidget(grid, p, o);
      if (t === '时间线') return EPWidgets.createEPTimelineWidget(grid, p, o);
      if (t === '数值') return EPWidgets.createEPNumberWidget(grid, p, o);
      if (t === 'Frame' || t === '卡片') return EPWidgets.createEPFrameWidget(grid, p, o);
      if (t === '超链接') return EPWidgets.createEPLinkWidget(grid, p, o);
      return null;
    }

    // 函数级注释：根据规范在指定 Grid 上创建控件并绑定遮罩（仅接受像素 rect）
    function createWidgetFromSpec(grid, spec) {
      if (!spec || !grid) return null;
      const rect = (spec.rect && typeof spec.rect === 'object') ? spec.rect : null;
      if (!rect || rect.x === undefined || rect.y === undefined || rect.w === undefined || rect.h === undefined) return null;

      const opts = { rect: rect };
      const p = spec.props || {};
      const groupId = String(spec.groupId || '').trim();
      const groupChain = String(spec.groupChain || '').trim();

      const node = __createWidgetByType(grid, spec.type, p, opts);
      if (node) {
        try { node.dataset.type = spec.type; } catch {}
        if (groupChain) {
          const chain = groupChain.split(',').map(s => String(s || '').trim()).filter(Boolean);
          __setNodeGroupChain(node, chain);
        } else if (groupId) {
          __setNodeGroupChain(node, [groupId]);
        } else {
          __setNodeGroupChain(node, []);
        }
        attachOverlay(node);
      }
      return node;
    }
    // 函数级注释：确保 Vue 和 ElementPlus 已加载后再执行回调；必要时尝试回退文件名
    function ensureEPReady(callback) {
      function loaded() {
        return (typeof window.Vue !== 'undefined' || typeof Vue !== 'undefined') && typeof window.ElementPlus !== 'undefined';
      }
      if (loaded()) { callback(); return; }
      // 若 Vue UMD 文件名为 vue.global.js，尝试回退加载
      if (typeof window.Vue === 'undefined' && typeof Vue === 'undefined') {
        var s = document.createElement('script');
        s.src = 'assets/vendor/vue.global.js';
        s.onload = function(){ callback(); };
        s.onerror = function(){ callback(); };
        document.head.appendChild(s);
      } else {
        // 等待现有脚本初始化
        var tries = 0;
        var timer = setInterval(function(){
          if (loaded() || (++tries > 40)) { clearInterval(timer); callback(); }
        }, 50);
      }
    }

    // 函数级注释：计算分组包围盒（以成员的像素坐标为准）
    function __getGroupRect(canvas, gid) {
      const members = __getGroupMembers(canvas, gid);
      if (!members || members.length === 0) return null;
      let minX = Infinity, minY = Infinity, maxR = -Infinity, maxB = -Infinity;
      members.forEach(n => {
        const r = __readRectPx(n);
        minX = Math.min(minX, r.x);
        minY = Math.min(minY, r.y);
        maxR = Math.max(maxR, r.x + r.w);
        maxB = Math.max(maxB, r.y + r.h);
      });
      return { x: minX, y: minY, w: Math.max(0, maxR - minX), h: Math.max(0, maxB - minY) };
    }

    // 函数级注释：平移整个分组（对分组内所有成员应用同样的 dx/dy）
    function __shiftGroup(canvas, gid, dx, dy, boundW, boundH) {
      const members = __getGroupMembers(canvas, gid);
      if (!members || members.length === 0) return;
      members.forEach(n => {
        const r = __readRectPx(n);
        let x = r.x + (Number(dx) || 0);
        let y = r.y + (Number(dy) || 0);
        if (Number.isFinite(boundW)) x = Math.max(0, Math.min(boundW - r.w, x));
        if (Number.isFinite(boundH)) y = Math.max(0, Math.min(boundH - r.h, y));
        __writeRectPx(n, { x, y, w: r.w, h: r.h });
      });
    }

    // 函数级注释：缩放整个分组到指定包围盒尺寸（按成员相对位置等比缩放，包含成员尺寸）
    function __resizeGroupTo(canvas, gid, targetW, targetH, boundW, boundH) {
      const members = __getGroupMembers(canvas, gid);
      if (!members || members.length === 0) return;
      const base = __getGroupRect(canvas, gid);
      if (!base || base.w <= 0 || base.h <= 0) return;
      const sx = Math.max(0.05, Number(targetW) / base.w);
      const sy = Math.max(0.05, Number(targetH) / base.h);
      members.forEach(n => {
        const r = __readRectPx(n);
        let x = base.x + (r.x - base.x) * sx;
        let y = base.y + (r.y - base.y) * sy;
        let w = r.w * sx;
        let h = r.h * sy;
        if (Number.isFinite(boundW)) x = Math.max(0, Math.min(boundW - w, x));
        if (Number.isFinite(boundH)) y = Math.max(0, Math.min(boundH - h, y));
        __writeRectPx(n, { x, y, w, h });
      });
    }

    // 函数级注释：合并左侧边栏到右侧边栏（将控件库移动到右侧；仅执行一次）
    function mergeLeftSidebarIntoRight() {
      try {
        if (window.__ns_left_sidebar_merged) return;
        window.__ns_left_sidebar_merged = true;
        const left = document.querySelector('.sidebar-left');
        const right = document.querySelector('.sidebar-right');
        if (!left || !right) return;
        const sections = Array.from(left.children || []).filter(el => el && el.classList && el.classList.contains('sidebar-section'));
        const anchor = right.firstElementChild;
        sections.forEach(sec => {
          try { right.insertBefore(sec, anchor); } catch { try { right.appendChild(sec); } catch {} }
        });
        try { if (left.parentElement) left.parentElement.removeChild(left); } catch {}
      } catch {}
    }

    // 函数级注释：初始化仪表盘（多标签分页与像素画布）
    function initDashboard() {
      // 提升变量声明到顶部，避免 TDZ 问题
      let currentSelected = null;
      let anchorSelected = null;
      const selectedNodes = new Set();
      window.__selectedGroupId = '';
      try { mergeLeftSidebarIntoRight(); } catch {}
      try { bindMousePosTracking(); } catch {}

      // 函数级注释：生成当前页的快照（设计尺寸与控件列表）
      function __snapshotGrid(grid) {
        try {
          const info = grids.get(activeTabId);
          const design = (info && info.design) ? info.design : { width: EPWidgets.layoutDefaults.designWidth, height: EPWidgets.layoutDefaults.designHeight, bgColor: EPWidgets.layoutDefaults.canvasBgColor || '#f8fafc' };
          const items = collectGridItems(grid);
          return { design, items };
        } catch { return { design: {}, items: [] }; }
      }
      // 函数级注释：将当前页快照压入历史（去重 & 限制长度）
      function pushHistorySnapshot(tid, grid) {
        try {
          if (!tid || !grid) return;
          const snap = __snapshotGrid(grid);
          const key = 'ns_hist_' + tid;
          const past = Array.isArray(JSON.parse(localStorage.getItem(key) || '[]')) ? JSON.parse(localStorage.getItem(key) || '[]') : [];
          const s = JSON.stringify(snap);
          const last = past.length ? JSON.stringify(past[past.length - 1]) : '';
          if (s !== last) {
            past.push(snap);
            while (past.length > 30) past.shift();
            localStorage.setItem(key, JSON.stringify(past));
            localStorage.removeItem(key + '_future');
          }
        } catch {}
      }
      // 函数级注释：应用快照到当前页
      function applySnapshot(tid, data) {
        try {
          const info = grids.get(tid);
          if (!info) return;
          const grid = info.grid;
          clearLayoutContainer(grid);
          applyPageDesign(tid, data.design);
          ensureEPReady(() => { (data.items || []).forEach(spec => { createWidgetFromSpec(grid, spec); }); });
          try { if (typeof __scheduleGroupIndicatorsUpdate === 'function') __scheduleGroupIndicatorsUpdate(); } catch {}
        } catch {}
      }
      // 函数级注释：撤销/恢复（基于本地历史栈）
      function undoLayout() {
        try {
          const tid = activeTabId; if (!tid) return;
          const key = 'ns_hist_' + tid; const fkey = key + '_future';
          const past = Array.isArray(JSON.parse(localStorage.getItem(key) || '[]')) ? JSON.parse(localStorage.getItem(key) || '[]') : [];
          if (past.length < 2) return;
          const cur = past.pop(); const prev = past[past.length - 1];
          localStorage.setItem(key, JSON.stringify(past));
          const future = Array.isArray(JSON.parse(localStorage.getItem(fkey) || '[]')) ? JSON.parse(localStorage.getItem(fkey) || '[]') : [];
          future.push(cur); localStorage.setItem(fkey, JSON.stringify(future));
          applySnapshot(tid, prev);
        } catch {}
      }
      function redoLayout() {
        try {
          const tid = activeTabId; if (!tid) return;
          const key = 'ns_hist_' + tid; const fkey = key + '_future';
          const past = Array.isArray(JSON.parse(localStorage.getItem(key) || '[]')) ? JSON.parse(localStorage.getItem(key) || '[]') : [];
          const future = Array.isArray(JSON.parse(localStorage.getItem(fkey) || '[]')) ? JSON.parse(localStorage.getItem(fkey) || '[]') : [];
          if (future.length < 1) return;
          const snap = future.pop(); localStorage.setItem(fkey, JSON.stringify(future));

      // 函数级注释：复制/粘贴当前选择（支持控件或分组成员）
      function __copySelection() {
        const wrap = Array.from(document.querySelectorAll('#tabsContent [data-tab-id]')).find(el => el.style.display !== 'none');
        const canvas = wrap ? wrap.querySelector('.pixel-canvas') : null;
        if (!canvas) return;
        let nodes = Array.from(selectedNodes);
        const gs = (window && window.__selectedGroupIds && typeof window.__selectedGroupIds.size === 'number') ? window.__selectedGroupIds : null;
        if ((!nodes || nodes.length === 0) && gs && gs.size > 0) {
          nodes = [];
          Array.from(gs).forEach(gid => {
            const m = __getGroupMembers(canvas, gid);
            nodes.push(...m);
          });
        }
        if (!nodes || nodes.length === 0) return;
        const specs = nodes.map(n => {
          const props = EPWidgets.getProps(n);
          const r = __readRectPx(n);
          const type = String(n.dataset.type || '');
          const chain = __getNodeGroupChain(n);
          const gid = (chain && chain.length) ? String(chain[chain.length - 1] || '').trim() : '';
          const spec = { type, props, rect: { x: r.x, y: r.y, w: r.w, h: r.h } };
          if (gid) spec.groupId = gid;
          if (chain && chain.length > 1) spec.groupChain = chain.join(',');
          return spec;
        });
        const bbox = specs.reduce((b, s) => ({ x: Math.min(b.x, s.rect.x), y: Math.min(b.y, s.rect.y) }), { x: Infinity, y: Infinity });
        const clip = { items: specs, bbox, tabId: activeTabId };

      }
      function __pasteSelection() {
        try {
          if (window.__nsPasteLock) return;
          window.__nsPasteLock = true;
          setTimeout(() => { try { window.__nsPasteLock = false; } catch {} }, 0);

          const clip = window.__clipboard || JSON.parse(localStorage.getItem('ns_clipboard') || '{}');
          if (!clip || !Array.isArray(clip.items) || clip.items.length === 0) return;
          const grid = getActiveGrid(); if (!grid) return;
          const pos = window.__lastMouseCanvasPos || null;
          const bx = (clip.bbox && Number.isFinite(clip.bbox.x)) ? clip.bbox.x : 0;
          const by = (clip.bbox && Number.isFinite(clip.bbox.y)) ? clip.bbox.y : 0;
          const targetX = (pos && Number.isFinite(pos.x)) ? pos.x : (bx + 20);
          const targetY = (pos && Number.isFinite(pos.y)) ? pos.y : (by + 20);
          const dx = targetX - bx;
          const dy = targetY - by;
          const gidMap = {};
          (clip.items || []).forEach(spec => {
            const chainStr = String(spec.groupChain || '').trim();
            const gids = chainStr ? chainStr.split(',').map(s => String(s || '').trim()).filter(Boolean) : [];
            const og = String(spec.groupId || '').trim();
            if (og && gids.indexOf(og) < 0) gids.push(og);
            gids.forEach(id => {
              if (id && !gidMap[id]) gidMap[id] = 'g_' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4);
            });
          });
          ensureEPReady(() => {
            clip.items.forEach(spec => {
              const r = { x: (spec.rect.x || 0) + dx, y: (spec.rect.y || 0) + dy, w: spec.rect.w, h: spec.rect.h };
              const chainStr = String(spec.groupChain || '').trim();
              let chain = chainStr ? chainStr.split(',').map(s => String(s || '').trim()).filter(Boolean) : [];
              if (!chain.length) {
                const og = String(spec.groupId || '').trim();
                if (og) chain = [og];
              }
              const mapped = chain.map(id => String(gidMap[id] || id));
              const leaf = mapped.length ? String(mapped[mapped.length - 1] || '').trim() : '';
              const s = { type: spec.type, props: spec.props, rect: r };
              if (leaf) s.groupId = leaf;

      // 函数级注释：创建一个新标签页并初始化像素画布

          input.style.width = '140px';
          input.value = oldName;
          tabBtn.innerHTML = '';
          tabBtn.appendChild(input);
          input.focus();
          input.select();
          const finish = (commit) => {
            const newName = (input.value || '').trim();
            tabBtn.removeChild(input);
            const finalName = commit && newName ? newName : oldName;
            renderTabLabel(tabBtn, finalName, tid);
            // 更新 grids 与 tabs 并持久化
            if (info) info.name = finalName;

              tabs[idx].name = finalName;
              try { localStorage.setItem('ns_tabs', JSON.stringify(tabs)); } catch {}
            }
          };
          input.onblur = () => finish(true);
          input.onkeydown = (evt) => {
            if (evt.key === 'Enter') finish(true);
            else if (evt.key === 'Escape') finish(false);

      // 函数级注释：绑定控件库拖拽到画布创建（HTML5 Drag&Drop）
      (function bindWidgetLibraryDragDrop(){
        const LIB_ID_TO_TYPE = {
          addButtonWidget: '按钮',
          addSliderWidget: '滑块',
          addFloatSliderWidget: '浮点滑块',
          addVSliderWidget: '竖向滑动条',

          addKnobWidget: '旋钮',
          addTimecodeWidget: '时间码',
          addTimelineWidget: '时间线',

        const MIME = 'text/x-ns-widget';

        // 函数级注释：获取当前激活页的像素画布元素
        function getActiveCanvasEl() {
          try {
            const info = activeTabId ? grids.get(activeTabId) : null;

          } catch { return null; }
        }

        // 函数级注释：将鼠标 client 坐标转换为设计坐标系下的像素坐标（考虑画布缩放）
        function clientToDesignXY(canvasEl, clientX, clientY) {
          return __clientToCanvasDesignXY(canvasEl, clientX, clientY);
        }

        // 函数级注释：按控件库按钮 id 在指定像素坐标创建控件并选中（像素坐标为设计坐标系 px）
        function addWidgetFromLibraryId(libId, px, py) {
          const id = String(libId || '').trim();
          const type = LIB_ID_TO_TYPE[id] || '';
          if (!type) return;

          ensureEPReady(() => {
            try {
              if (!document.body.classList.contains('edit-mode')) {
                setGlobalEditMode(true);
                applyEditModeAll(true);
              }
            } catch {}

            const grid = getActiveGrid();
            if (!grid) return;

            const node = __createWidgetByType(grid, type, {}, {});
            if (!node) return;
            try { node.dataset.type = type; } catch {}
            try { attachOverlay(node); } catch {}

            try {
              const r0 = __readRectPx(node);
              const info = activeTabId ? grids.get(activeTabId) : null;
              const boundW = info && info.design ? Number(info.design.width) : NaN;
              const boundH = info && info.design ? Number(info.design.height) : NaN;

              const w = Math.max(40, Math.round(Number(r0.w) || 40));
              const h = Math.max(30, Math.round(Number(r0.h) || 30));

              let x = Math.round((Number(px) || 0) - w / 2);
              let y = Math.round((Number(py) || 0) - h / 2);
              if (Number.isFinite(boundW)) x = Math.max(0, Math.min(boundW - w, x));
              if (Number.isFinite(boundH)) y = Math.max(0, Math.min(boundH - h, y));
              __writeRectPx(node, { x, y, w, h });
            } catch {}

            if (node && typeof window.__selectNode === 'function') {
              window.__selectNode(node, { toggle: false });
            }
            try { if (typeof window.__saveLayoutLocal === 'function' && activeTabId) window.__saveLayoutLocal(activeTabId, grid); } catch {}
          });
        }

        // 函数级注释：为控件库按钮启用 draggable 并在 dragstart 写入控件类型
        function initLibraryButtons() {
          const btns = Array.from(document.querySelectorAll('.widget-thumb-grid .widget-thumb'));
          btns.forEach(btn => {
            try {
              const id = String(btn && btn.id ? btn.id : '').trim();
              if (!id) return;
              if (!LIB_ID_TO_TYPE[id]) return;
              btn.setAttribute('draggable', 'true');
              btn.addEventListener('dragstart', (e) => {
                try {
                  if (!e || !e.dataTransfer) return;
                  e.dataTransfer.effectAllowed = 'copy';
                  try { e.dataTransfer.setData(MIME, id); } catch {}
                  try { e.dataTransfer.setData('text/plain', id); } catch {}
                  const c = getActiveCanvasEl();
                  if (c) c.classList.add('ns-drop-over');
                } catch {}
              });
              btn.addEventListener('dragend', () => {
                try {
                  const c = getActiveCanvasEl();
                  if (c) c.classList.remove('ns-drop-over');
                } catch {}
              });
            } catch {}
          });
        }

        // 函数级注释：绑定画布 drop 接收，按落点创建控件
        function initCanvasDropTarget() {
          const host = document.getElementById('tabsContent');
          if (!host) return;
          if (host.dataset.libDndBound) return;
          host.dataset.libDndBound = '1';

          host.addEventListener('dragover', (e) => {
            try {
              if (!e || !e.dataTransfer) return;
              const types = Array.from(e.dataTransfer.types || []);
              const ok = types.includes(MIME) || types.includes('text/plain');
              if (!ok) return;
              e.preventDefault();
              try { e.dataTransfer.dropEffect = 'copy'; } catch {}
              const c = getActiveCanvasEl();
              if (c) c.classList.add('ns-drop-over');
            } catch {}
          });

          host.addEventListener('dragleave', () => {
            try {
              const c = getActiveCanvasEl();
              if (c) c.classList.remove('ns-drop-over');
            } catch {}
          });

          host.addEventListener('drop', (e) => {
            try {
              if (!e || !e.dataTransfer) return;
              const raw = String((e.dataTransfer.getData(MIME) || e.dataTransfer.getData('text/plain') || '')).trim();
              if (!raw) return;
              e.preventDefault();

              const c = getActiveCanvasEl();
              if (!c) return;
              c.classList.remove('ns-drop-over');

              const p = clientToDesignXY(c, e.clientX, e.clientY);
              addWidgetFromLibraryId(raw, p.x, p.y);
            } catch {}
          });
        }

        initLibraryButtons();
        initCanvasDropTarget();
      })();

      // 函数级注释：绑定对齐/统一尺寸/分组按钮事件（按住 Ctrl/Shift 多选后使用）

      // 函数级注释：在画布空白区域执行“命中分组并选中/拖拽整组”的交互（drawio 风格）
      (function bindGroupHitTestOnCanvas(){

        if (!host) return;

          const groups = new Map();
          nodes.forEach(n => {
            const chain = __getNodeGroupChain(n);
            if (!chain || !chain.length) return;
            const r = __readRectPx(n);
            chain.forEach(gid => {
              const g = String(gid || '').trim();
              if (!g) return;
              if (!groups.has(g)) groups.set(g, []);
              groups.get(g).push(r);
            });
          });

          let hitGid = '';
          let bestArea = Infinity;
          groups.forEach((rects, gid) => {
            if (!rects || rects.length < 2) return;
            let minX = Infinity, minY = Infinity, maxR = -Infinity, maxB = -Infinity;
            rects.forEach(r => {

              minY = Math.min(minY, r.y);
              maxR = Math.max(maxR, r.x + r.w);
              maxB = Math.max(maxB, r.y + r.h);

            const x = minX - 8, y = minY - 8;
            const w = (maxR - minX) + 16;
            const h = (maxB - minY) + 16;
            if (px >= x && px <= x + w && py >= y && py <= y + h) {
              const area = Math.max(1, w * h);
