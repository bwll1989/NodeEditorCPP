        });

        targets.forEach(n => {
          const chain = __getNodeGroupChain(n);
          const c2 = chain.slice(common.length);
          const next = common.concat([newGid], c2);
          __setNodeGroupChain(n, next);
        });

        try {
          clearSelection();
          selectGroup(newGid);
        } catch {}

        try { updatePropPanel(currentSelected); } catch {}
        try { if (activeTabId) saveLayoutLocal(activeTabId, getActiveGrid()); } catch {}
        try { if (typeof __scheduleGroupIndicatorsUpdate === 'function') __scheduleGroupIndicatorsUpdate(); } catch {}
      }

      // 函数级注释：取消当前选择控件或分组的分组标记；支持嵌套分组（移除指定层级或移除最内层）
      function ungroupSelected() {
        if (!getGlobalEditMode()) return;
        const canvas = __getActiveCanvasEl();
        if (!canvas) return;

        const { gids, independentNodes, entities } = __getSelectedEntities(canvas);
        if (entities.length < 1) return;

        gids.forEach(gid => {
          const g = String(gid || '').trim();
          if (!g) return;
          const members = __getGroupMembers(canvas, g);
          members.forEach(n => {
            const chain = __getNodeGroupChain(n);
            const idx = chain.indexOf(g);
            if (idx >= 0) chain.splice(idx, 1);
            __setNodeGroupChain(n, chain);
          });
        });

        independentNodes.forEach(n => {
          const chain = __getNodeGroupChain(n);
          if (chain && chain.length) chain.pop();
          __setNodeGroupChain(n, chain);
        });

        try {
          clearSelection();
        } catch {}

        updateAlignHint();
        updatePropPanel(null);
        try { if (activeTabId) saveLayoutLocal(activeTabId, getActiveGrid()); } catch {}
        try { if (typeof __scheduleGroupIndicatorsUpdate === 'function') __scheduleGroupIndicatorsUpdate(); } catch {}
      }

      // 函数级注释：将当前选中的多个控件或分组按等间距分布（水平/垂直；需要至少3个对象）
      function distributeSelected(axis) {
        if (!getGlobalEditMode()) return;
        const grid = getActiveGrid();
        if (!grid) return;
        const canvas = __getActiveCanvasEl();
        if (!canvas) return;

        const { entities } = __getSelectedEntities(canvas);
        if (entities.length < 3) return;

        const info = activeTabId ? grids.get(activeTabId) : null;
        const boundW = info && info.design ? Number(info.design.width) : NaN;
        const boundH = info && info.design ? Number(info.design.height) : NaN;

        if (axis === 'h') {
          entities.sort((a, b) => (a.r.x - b.r.x) || (a.r.y - b.r.y));
          const minX = Math.min.apply(null, entities.map(it => it.r.x));
          const maxR = Math.max.apply(null, entities.map(it => it.r.x + it.r.w));
          const sumW = entities.reduce((s, it) => s + it.r.w, 0);
          const gap = (maxR - minX - sumW) / (entities.length - 1);
          let cursor = minX;
          entities.forEach(it => {
            if (it.type === 'group') {
              const dx = cursor - it.r.x;
              __shiftGroup(canvas, it.id, dx, 0, boundW, boundH);
            } else {
              __writeRectPx(it.node, { x: cursor, y: it.r.y, w: it.r.w, h: it.r.h });
            }
            cursor = cursor + it.r.w + gap;
          });
        } else {
          entities.sort((a, b) => (a.r.y - b.r.y) || (a.r.x - b.r.x));
          const minY = Math.min.apply(null, entities.map(it => it.r.y));
          const maxB = Math.max.apply(null, entities.map(it => it.r.y + it.r.h));
          const sumH = entities.reduce((s, it) => s + it.r.h, 0);
          const gap = (maxB - minY - sumH) / (entities.length - 1);
          let cursor = minY;
          entities.forEach(it => {
            if (it.type === 'group') {
              const dy = cursor - it.r.y;
              __shiftGroup(canvas, it.id, 0, dy, boundW, boundH);
            } else {
              __writeRectPx(it.node, { x: it.r.x, y: cursor, w: it.r.w, h: it.r.h });
            }
            cursor = cursor + it.r.h + gap;
          });
        }

        try { if (activeTabId) saveLayoutLocal(activeTabId, grid); } catch {}
        try { if (typeof __scheduleGroupIndicatorsUpdate === 'function') __scheduleGroupIndicatorsUpdate(); } catch {}
      }

      // 函数级注释：统一当前选中的多个控件或分组尺寸（以锚点作为参考）
      function sameSizeSelected() {
        if (!getGlobalEditMode()) return;
        const grid = getActiveGrid();
        if (!grid) return;
        const canvas = __getActiveCanvasEl();
        if (!canvas) return;

        const { gids, independentNodes, entities } = __getSelectedEntities(canvas);
        if (entities.length < 2) return;

        let refEntity = null;
        let refRect = null;
        let refGid = String((window && window.__selectedGroupAnchor) || '').trim();
        let refNode = anchorSelected;

        if (refNode && independentNodes.includes(refNode)) {
          refEntity = { type: 'node', node: refNode };
          refRect = __readRectPx(refNode);
        } else if (refGid && gids.includes(refGid)) {
          refEntity = { type: 'group', id: refGid };
          refRect = __getGroupRect(canvas, refGid);
        } else {
          refEntity = entities[0];
          refRect = refEntity.r;
        }

        if (!refRect) return;

        const targetW = Math.max(10, refRect.w);
        const targetH = Math.max(10, refRect.h);
        const info = activeTabId ? grids.get(activeTabId) : null;
        const boundW = info && info.design ? Number(info.design.width) : NaN;
        const boundH = info && info.design ? Number(info.design.height) : NaN;

        entities.forEach(it => {
          if (it.type === 'group' && it.id === refEntity.id) return;
          if (it.type === 'node' && it.node === refEntity.node) return;

          if (it.type === 'group') {
            __resizeGroupTo(canvas, it.id, targetW, targetH, boundW, boundH);
          } else {
            let x = it.r.x;
            let y = it.r.y;
            if (Number.isFinite(boundW)) x = Math.max(0, Math.min(boundW - targetW, x));
            if (Number.isFinite(boundH)) y = Math.max(0, Math.min(boundH - targetH, y));
            __writeRectPx(it.node, { x, y, w: targetW, h: targetH });
          }
        });

        try { if (activeTabId) saveLayoutLocal(activeTabId, grid); } catch {}
        try { if (typeof __scheduleGroupIndicatorsUpdate === 'function') __scheduleGroupIndicatorsUpdate(); } catch {}
      }


      // 函数级注释：初始化颜色输入：保存原始值到 dataset，并给 input[type=color] 设置一个安全的 hex 占位值
      function __initColorInput(inp, raw, fallbackHex) {
        try {
          const fb0 = String(fallbackHex || '#000000').trim();
          const fb = /^#[0-9a-fA-F]{6}$/.test(fb0) ? fb0 : '#000000';
          const s = (raw !== undefined && raw !== null) ? String(raw).trim() : '';
          const rawStr = s || fb;
          inp.dataset.colorRaw = rawStr;
          inp.value = fb;
        } catch {}
      }

      // 函数级注释：将属性面板中的颜色输入升级为 Element Plus ColorPicker（开启 alpha），并把值同步到隐藏 input 供属性应用读取
      function __upgradeColorInputs(rootEl) {
        try {
          const root = rootEl || document;
          const VueG = (window && window.Vue) ? window.Vue : null;
          const EPG = (window && window.ElementPlus) ? window.ElementPlus : null;
          if (!VueG || !VueG.createApp || !EPG) return;

          const inputs = root && root.querySelectorAll ? Array.from(root.querySelectorAll('input[type="color"]')) : [];
          inputs.forEach(inp => {
            if (!inp || (inp.dataset && inp.dataset.alphaUpgraded === '1')) return;
            const parent = inp.parentElement;
            if (!parent) return;

            const originalOnChange = inp.onchange;
            const disabled = !!inp.disabled;

            const raw = (inp.dataset && inp.dataset.colorRaw) ? String(inp.dataset.colorRaw || '').trim() : '';
            const baseCss = String(raw || inp.value || '').trim() || 'rgba(0,0,0,1)';

            inp.dataset.alphaUpgraded = '1';
            inp.type = 'hidden';
            try { inp.style.display = 'none'; } catch {}
            inp.value = baseCss;
            inp.dataset.colorRaw = baseCss;

            const ctl = document.createElement('div');
            ctl.className = 'd-flex align-items-center';
            ctl.style.gap = '8px';
            ctl.style.position = 'relative';

            const mountEl = document.createElement('div');
            mountEl.style.maxWidth = '260px';

            let mounted = false;
            let proxy = null;

            const ensureMounted = () => {
              if (mounted) return;
              const initColor = String(inp.value || baseCss).trim() || baseCss;
              const app = VueG.createApp({
                data() {
                  return { color: initColor, disabled: disabled };
                },
                watch: {
                color(v) {
                  const s = (v !== undefined && v !== null) ? String(v).trim() : '';
                  if (!s) return;
                  inp.value = s;
                  inp.dataset.colorRaw = s;
                  try { inp.dispatchEvent(new Event('input', { bubbles: true })); } catch {}
                  try { inp.dispatchEvent(new Event('change', { bubbles: true })); } catch {}
                }
              },
                template: '<el-color-picker v-model="color" :disabled="disabled" :teleported="false" popper-class="ns-color-popper" show-alpha color-format="rgb" clearable />'
              });
              try { app.use(EPG); } catch {}
              proxy = app.mount(mountEl);
              mounted = true;
            };


            let replaced = false;
            try {
              parent.replaceChild(ctl, inp);
              replaced = true;
            } catch {}
            if (!replaced) return;

            if (disabled) {
              try { inp.disabled = true; } catch {}
            }

            ctl.appendChild(mountEl);
            ctl.appendChild(inp);
            ensureMounted();
          });
        } catch {}
      }

      // 函数级注释：关闭当前页面可能残留的 Element Plus 颜色选择器浮层（避免锚点被移除后浮层跑到左上角）
      function __closeEpColorPickers() {

          const inDrill = !!(drill && drill === gid);
          const hasNodeSelection = !!(typeof selectedNodes !== 'undefined' && selectedNodes && selectedNodes.size > 0);

          // 处于组内钻取/控件选择模式时：点击组内控件直接走控件选择（支持 Ctrl/Shift 多选）
          if (nodeIsSelected || inDrill || hasNodeSelection) {
            if (typeof window.__selectNode === 'function') window.__selectNode(node, { toggle });
            __startDragOrEnterInput(overlay, node, e, { toggle });
            return;
          }

          const gs = (window && window.__selectedGroupIds && typeof window.__selectedGroupIds.has === 'function') ? window.__selectedGroupIds : null;
          const wasGroupSelected = !!(gs && gs.has(gid));

          // 第一次点击：只选中分组，不选中组内控件
          if (typeof window.__selectGroup === 'function') {
            if (!wasGroupSelected) window.__selectGroup(gid, { toggle });
          }

          let moved = false;
          const sx = Number(e.clientX) || 0;
          const sy = Number(e.clientY) || 0;

          const cleanup = () => {
            overlay.removeEventListener('pointermove', onMove);
            overlay.removeEventListener('pointerup', onUp);
            overlay.removeEventListener('pointercancel', onUp);
            try { overlay.releasePointerCapture(e.pointerId); } catch {}
          };

          const collectGroupTargets = () => {
            const wrap = __getActiveWrap();
            if (!wrap) return [node];
            const canvas = wrap.querySelector('.pixel-canvas');
            if (!canvas) return [node];

            const gs2 = (window && window.__selectedGroupIds && typeof window.__selectedGroupIds.has === 'function') ? window.__selectedGroupIds : null;
            const raw = (gs2 && gs2.size && gs2.has(gid)) ? Array.from(gs2) : [gid];
            const gids = __normalizeSelectedGroupIds(canvas, raw);

            const out = [];
            const seen = new Set();
            gids.forEach(g => {
              const g2 = String(g || '').trim();
              if (!g2) return;
              const members = __getGroupMembers(canvas, g2);
              members.forEach(n => {
                if (!n) return;
                if (seen.has(n)) return;
                seen.add(n);
                out.push(n);
              });
            });
            return out.length ? out : [node];
          };

          const onMove = (ev) => {
            const dx = (Number(ev.clientX) || 0) - sx;
            const dy = (Number(ev.clientY) || 0) - sy;
            if (!moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
              moved = true;
              cleanup();
              __startDragNodes(overlay, collectGroupTargets(), e);
            }
          };

          const onUp = () => {
            cleanup();
            // 分组已选中时的再次点击：进入控件选择模式（支持 Ctrl/Shift 多选）
            if (!moved && wasGroupSelected) {
              if (typeof window.__selectNode === 'function') window.__selectNode(node, { toggle });
              __enterInputInteractIfNeeded(node, { toggle });
            }
          };

          try { overlay.setPointerCapture(e.pointerId); } catch {}
          overlay.addEventListener('pointermove', onMove);
          overlay.addEventListener('pointerup', onUp);
          overlay.addEventListener('pointercancel', onUp);
          return;
        }

        if (typeof window.__selectNode === 'function') window.__selectNode(node, { toggle });
        __startDragOrEnterInput(overlay, node, e, { toggle });
      });
    }

    // 函数级注释：添加控件并立即进入编辑与选中（全局函数）
    function attachAndSelect(node, type) {
      if (!node) return;
      const editModeSwitch = document.getElementById('editModeSwitch');
      if (editModeSwitch && !editModeSwitch.checked) {
        editModeSwitch.checked = true;
        editModeSwitch.dispatchEvent(new Event('change'));
      }
      node.dataset.type = type;
      attachOverlay(node);
      if (typeof window.__selectNode === 'function') window.__selectNode(node);
    }

    // 函数级注释：保存布局到后端（保留旧入口，实际走多分页保存）
    function saveLayout(grid) {
      try {
        saveAllLayouts();
      } catch (e) {
        alert('保存失败: ' + e);
      }
    }

    // 函数级注释：保存所有分页布局到后端（包含 tabs、activeTabId 与 pages 映射）
    function saveAllLayouts() {
      try {
        const pages = {};
        grids.forEach((info, tid) => {
          const items = collectGridItems(info.grid);
          const design = (info && info.design) ? info.design : { width: EPWidgets.layoutDefaults.designWidth, height: EPWidgets.layoutDefaults.designHeight };
          pages[tid] = { design, items };
        });
        const payload = { tabs, activeTabId, pages };
        fetch('/api/layout/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
        .then(r => r.text())
        .then(text => {
          try {
            const j = JSON.parse(text);
            if (j.ok) {
                 // alert('布局已保存');
            }
            else alert('保存失败: ' + (j.error || '未知错误'));
          } catch (e) {
            if (text.includes('"ok":true')) {
                 // alert('布局已保存');
            }
            else throw new Error('服务器响应格式错误: ' + text.substring(0, 50) + '...');
          }
        })
        .catch(e => alert('保存请求失败: ' + e));
      } catch (err) {
        alert('保存异常: ' + err);
      }
    }

    // 函数级注释：从后端恢复所有分页布局（仅支持新格式）
    function loadLayout(grid, silent = false) {
      fetch('/api/layout/load')
        .then(r => r.json())
        .then(data => {
          let items = [];
          // 仅支持新格式（多页）
          if (data && data.pages && typeof data.pages === 'object' && Array.isArray(data.tabs)) {
             // 查找当前 grid 对应的 tid
             let tid = null;
             grids.forEach((info, key) => { if (info.grid === grid) tid = key; });
             if (tid && data.pages[tid]) {
                 items = data.pages[tid].items || [];
             }
          }
          
          // 空布局也视为成功：清空并标记为已加载，不弹窗
          clearLayoutContainer(grid);
          ensureEPReady(() => {
            items.forEach(spec => { createWidgetFromSpec(grid, spec); });
          });
          try {
            grids.forEach(info => { if (info.grid === grid) info.loaded = true; });
          } catch {}
          if (items.length > 0) {
            if (!silent) alert('布局加载成功');
          } else {
            console.log('当前没有保存的布局，显示空页面');
          }
        })
        .catch(e => {
            // 失败则尝试从本地存储按页面加载
            try {
              if (activeTabId) {
                const raw = localStorage.getItem('ns_layout_' + activeTabId);
                if (raw) {
                  const data = JSON.parse(raw);
                  const items = data.items || [];
                  if (items.length > 0) {
                    clearLayoutContainer(grid);
                    ensureEPReady(() => {
                      items.forEach(spec => { createWidgetFromSpec(grid, spec); });
                    });
                    if (!silent) alert('离线布局加载成功');
                    return;
                  }
                }
              }
            } catch(err) {
              console.error('Local load failed:', err);
            }
            if (!silent) alert('加载失败: ' + e);
            else console.error('Auto-load failed:', e);
        });
    }

    // 函数级注释：加载所有分页布局（若后端返回新格式则重建分页与内容）
    function loadAllLayouts() {
      fetch('/api/layout/load')
        .then(r => r.json())
        .then(data => {
          const hasPages = data && data.pages && typeof data.pages === 'object';
          const hasTabs = Array.isArray(data.tabs);
          if (hasPages && hasTabs) {
            // 清空现有分页
            try {
              tabs = [];
              grids.forEach(info => {
                if (info && info.pageWrap && info.pageWrap.parentElement) {
                  info.pageWrap.parentElement.removeChild(info.pageWrap);
                }
              });
              grids.clear();
              const tabsList = document.getElementById('tabsList');
              const tabsContent = document.getElementById('tabsContent');
              tabsList.innerHTML = '';
              tabsContent.innerHTML = '';
            } catch {}
            // 重建分页
            data.tabs.forEach(t => {
              if (window.__createTab) window.__createTab(t.name, t.id, { skipLocalLoad: true });
              else createTab(t.name, t.id, { skipLocalLoad: true });
            });
            // 渲染各页内容
            Object.keys(data.pages).forEach(tid => {
              const info = grids.get(tid);
              if (!info) return;
              const page = data.pages[tid] || {};
              const items = page.items || [];
              if (page.design) applyPageDesign(tid, page.design);
              clearLayoutContainer(info.grid);
              ensureEPReady(() => {
                items.forEach(spec => { createWidgetFromSpec(info.grid, spec); });
                const info2 = grids.get(tid);
                if (info2) info2.loaded = true;
              });
            });
            const targetActive = data.activeTabId && grids.has(data.activeTabId) ? data.activeTabId : (data.tabs[0] && data.tabs[0].id);
            if (targetActive) {
              if (window.__switchTab) window.__switchTab(targetActive);
              else switchTab(targetActive);
            }
            
            // 布局加载完成后，延迟查询状态以确保控件已创建
            setTimeout(queryAllStatuses, 500);
           
          }
        })
        .catch(e => alert('加载失败: ' + e));
    }

    window.addEventListener('DOMContentLoaded', initDashboard);
  </script>
