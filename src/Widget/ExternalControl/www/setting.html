<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <title>设置 - NodeStudio</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="assets/vendor/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; }
    .container { max-width: 960px; padding-top: 24px; padding-bottom: 24px; }
    .card { margin-bottom: 16px; }
    .progress { height: 6px; }
  </style>
</head>
<body>
  <div class="container" id="pageContent" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">设置</h1>
      <a class="btn btn-sm btn-outline-secondary" href="index.html">返回仪表盘</a>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title">上传媒体文件</h5>
        <p class="text-muted">支持常见音视频/图片等文件</p>
        <div class="mb-2">
          <input type="file" id="mediaFile" class="form-control" accept="video/*,audio/*,image/*,.mp4,.mov,.avi,.mkv,.mp3,.wav,.png,.jpg,.jpeg,.gif"/>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button id="uploadMediaBtn" class="btn btn-primary btn-sm">上传媒体</button>
          <span id="mediaStatus" class="text-muted small"></span>
        </div>
        <div class="progress mt-2 d-none" id="mediaProgressWrap">
          <div class="progress-bar" role="progressbar" style="width: 0%;" id="mediaProgress"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title">上传项目文件（.flow）</h5>
        <p class="text-muted">仅允许 <code>.flow</code> 扩展名</p>
        <div class="mb-2">
          <input type="file" id="flowFile" class="form-control" accept=".flow"/>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button id="uploadFlowBtn" class="btn btn-primary btn-sm">上传项目</button>
          <span id="flowStatus" class="text-muted small"></span>
        </div>
        <div class="progress mt-2 d-none" id="flowProgressWrap">
          <div class="progress-bar" role="progressbar" style="width: 0%;" id="flowProgress"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title">下载当前项目</h5>
        <p class="text-muted">下载当前正在运行的项目文件</p>
        <p class="text-muted small">当前文件：<code id="currentFlowName">检测中...</code></p>
        <div class="d-flex align-items-center gap-2">
          <button id="downloadFlowBtn" class="btn btn-success btn-sm">下载文件</button>
          <span id="downloadStatus" class="text-muted small"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 函数级注释：向服务器提交设置页密码进行校验（POST /api/auth/setting）
    async function verifySettingPassword(password) {
      try {
        const resp = await fetch('/api/auth/setting', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: password || '' })
        });
        const j = await resp.json().catch(() => null);
        return !!(resp.ok && j && j.ok);
      } catch {
        return false;
      }
    }

    // 函数级注释：进入设置页前进行密码校验（若服务器未配置密码，则自动通过）
    async function requireSettingAuth() {
      const okEmpty = await verifySettingPassword('');
      if (okEmpty) return true;

      while (true) {
        const pw = window.prompt('请输入设置页面密码');
        if (pw === null) return false;
        const ok = await verifySettingPassword(pw);
        if (ok) return true;
        window.alert('密码错误');
      }
    }

    // 函数级注释：将文件通过二进制流上传到指定接口（带进度显示）
    async function uploadFileBinary(url, file, progressEl, progressWrap, statusEl) {
      if (!file) { statusEl.textContent = '请选择文件'; return; }
      progressWrap.classList.remove('d-none');
      progressEl.style.width = '0%';
      statusEl.textContent = '开始上传...';

      try {
        const total = file.size || 0;
        let uploaded = 0;

        const stream = file.stream();
        const reader = stream.getReader();
        const chunks = [];
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          uploaded += value.byteLength;
          const pct = total ? Math.round((uploaded / total) * 100) : 0;
          progressEl.style.width = pct + '%';
        }
        const blob = new Blob(chunks, { type: 'application/octet-stream' });

        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: blob
        });
        const text = await resp.text();
        let j = null;
        try { j = JSON.parse(text); } catch {}
        if (resp.ok && j && j.ok) {
          statusEl.textContent = '上传成功：' + (j.path || '');
          progressEl.style.width = '100%';
        } else {
          statusEl.textContent = '上传失败：' + (j && j.error ? j.error : resp.status + ' ' + text);
        }
      } catch (e) {
        statusEl.textContent = '上传异常：' + e;
      }
    }

    // 函数级注释：上传媒体文件（POST /api/upload/media?filename=xxx）
    function uploadMedia() {
      const file = document.getElementById('mediaFile').files[0];
      const statusEl = document.getElementById('mediaStatus');
      const progressEl = document.getElementById('mediaProgress');
      const progressWrap = document.getElementById('mediaProgressWrap');
      if (!file) { statusEl.textContent = '请选择媒体文件'; return; }
      const url = '/api/upload/media?filename=' + encodeURIComponent(file.name);
      uploadFileBinary(url, file, progressEl, progressWrap, statusEl);
    }

    // 函数级注释：上传.flow项目文件（POST /api/upload/flow?filename=xxx）
    function uploadFlow() {
      const file = document.getElementById('flowFile').files[0];
      const statusEl = document.getElementById('flowStatus');
      const progressEl = document.getElementById('flowProgress');
      const progressWrap = document.getElementById('flowProgressWrap');
      if (!file) { statusEl.textContent = '请选择.flow文件'; return; }
      if (!file.name.toLowerCase().endsWith('.flow')) {
        statusEl.textContent = '文件扩展名必须为 .flow';
        return;
      }
      const url = '/api/upload/flow?filename=' + encodeURIComponent(file.name);
      uploadFileBinary(url, file, progressEl, progressWrap, statusEl);
    }

    // 函数级注释：下载当前.flow项目文件
    async function downloadFlow() {
      const statusEl = document.getElementById('downloadStatus');
      statusEl.textContent = '正在请求...';
      try {
        const resp = await fetch('/api/download/current_flow');
        if (!resp.ok) {
          const j = await resp.json().catch(() => ({}));
          throw new Error(j.error || resp.statusText);
        }

        const blob = await resp.blob();
        const disposition = resp.headers.get('Content-Disposition') || '';
        let filename = 'project.flow';
        const matches = /filename="([^"]*)"/.exec(disposition);
        if (matches && matches[1]) {
            filename = matches[1];
        }

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        statusEl.textContent = '下载完成';
      } catch (e) {
        statusEl.textContent = '下载失败：' + e.message;
      }
    }

    // 函数级注释：获取当前Flow文件信息并显示
    async function fetchCurrentFlowInfo() {
      const nameEl = document.getElementById('currentFlowName');
      try {
        const resp = await fetch('/api/info/current_flow');
        if (resp.ok) {
          const j = await resp.json();
          if (j.ok && j.filename) {
            nameEl.textContent = j.filename;
          } else {
            nameEl.textContent = '无项目运行';
          }
        } else {
          nameEl.textContent = '获取失败';
        }
      } catch (e) {
        nameEl.textContent = '连接异常';
      }
    }

    // 函数级注释：初始化页面（先鉴权，再绑定事件并加载数据）
    async function initSettingPage() {
      const content = document.getElementById('pageContent');
      const ok = await requireSettingAuth();
      if (!ok) {
        window.location.href = 'index.html';
        return;
      }

      content.style.display = '';
      document.getElementById('uploadMediaBtn').onclick = uploadMedia;
      document.getElementById('uploadFlowBtn').onclick = uploadFlow;
      document.getElementById('downloadFlowBtn').onclick = downloadFlow;
      fetchCurrentFlowInfo();
    }

    document.addEventListener('DOMContentLoaded', initSettingPage);
  </script>
</body>
</html>
